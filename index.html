                      if(calendarFilter !== 'ALL' && dayEvents.length === 0) return null; 

                      return (
                        <div key={day} 
                             className={`border-2 rounded-2xl p-4 shadow-sm transition dark:border-gray-700 ${dayEvents.length > 0 ? 'bg-white dark:bg-gray-800 border-gray-300' : 'bg-gray-50 dark:bg-gray-900 border-gray-100'}`}
                             onDragOver={onDragOver}
                             onDrop={(e) => day ? onDrop(e, day) : null}
                        >
                          <div className="flex items-center gap-3 mb-3 border-b border-gray-200 dark:border-gray-700 pb-2">
                            <span className={`w-10 h-10 flex items-center justify-center rounded-full font-black text-lg ${dayEvents.length > 0 ? 'bg-black text-white dark:bg-white dark:text-black shadow-md' : 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'}`}>
                              {day}
                            </span>
                            <span className={`font-black text-sm uppercase tracking-wide ${dayEvents.length > 0 ? 'text-gray-800 dark:text-gray-200' : 'text-gray-400 dark:text-gray-500'}`}>
                              {dayOfWeek}
                            </span>
                          </div>
                          
                          {dayEvents.length > 0 ? (
                            <div className="flex flex-col gap-3 pl-2">
                              {dayEvents.map((event, eIdx) => {
                                const color = safeColorOptions.find(c => c.id === event.color);
                                if (!color) return null;
                                
                                const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                                const status = getEventStatus(originalIndex);
                                const finalColor = getStatusColor(color.color, status);
                                const textColor = getTextColor(finalColor);
                                
                                return (
                                  <div
                                    key={eIdx}
                                    draggable={isAdmin}
                                    onDragStart={(e) => onDragStart(e, originalIndex)}
                                    style={{ backgroundColor: finalColor, color: textColor }}
                                    className={`rounded-xl px-4 py-3 text-sm font-bold shadow-md flex flex-col break-words whitespace-normal leading-tight ${isAdmin ? 'cursor-grab active:cursor-grabbing' : ''}`}
                                  >
                                    {event.imageUrl && (
                                      <div className="mb-2 flex flex-col gap-1">
                                          <a href={event.imageUrl} target="_blank" className="text-[10px] bg-black bg-opacity-20 hover:bg-opacity-30 text-white rounded px-2 py-1 inline-flex items-center gap-1 w-fit transition shadow-sm">🔗 Ver Arte/Link</a>
                                          <img src={event.imageUrl} className="w-full h-32 object-cover rounded border border-black border-opacity-20" alt="Arte" onError={(e) => e.target.style.display='none'} />
                                      </div>
                                    )}
                                    <span className="text-base">
                                        {event.text}
                                        {status === 'done' && <span className="ml-2">✓</span>}
                                        {status === 'late' && <span className="ml-2">⚠</span>}
                                    </span>
                                    {event.notes && (
                                      <div style={{ backgroundColor: 'rgba(255,255,255,0.2)'}} className="mt-2 p-3 rounded-lg text-xs font-normal border border-white border-opacity-30 shadow-inner">
                                          <p className="whitespace-pre-wrap">{event.notes}</p>
                                      </div>
                                    )}
                                    <div className="mt-2 text-[10px] opacity-80 bg-black bg-opacity-10 p-2 rounded-lg font-medium">
                                       👤 Criado: {event.createdBy} {event.updatedBy ? `| ✏️ Editado: ${event.updatedBy}` : ''}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          ) : (
                            <p className="text-xs font-bold text-gray-400 dark:text-gray-500 italic pl-2">Nenhum post agendado ou solte aqui...</p>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {getLegendItems().length > 0 && (
                    <div className="mt-8 md:mt-12 pt-6 border-t border-gray-200 dark:border-gray-700">
                      <h3 className="font-bold text-lg md:text-xl mb-4 text-gray-800 dark:text-white">LEGENDA</h3>
                      <div className="flex flex-wrap gap-2 md:gap-3">
                        {getLegendItems().map(item => (
                          <div key={item.id} style={{ backgroundColor: item.color || '#000000', color: getTextColor(item.color) }} className="rounded-full px-4 md:px-6 py-2 text-xs md:text-sm font-bold shadow-md border border-black border-opacity-10">
                            {item.label}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CalendarCreator /></ErrorBoundary>);
    </script>
</body>
</html>
