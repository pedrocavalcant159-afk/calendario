<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Calendário de Conteúdo - UPLI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body className="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.toString() }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-8">
                            <div className="bg-white p-8 rounded-xl shadow-xl border-2 border-red-500 max-w-2xl w-full">
                                <h2 className="text-2xl font-black text-red-600 mb-4">Oops! Algo bloqueou a tela.</h2>
                                <p className="text-gray-700 mb-4">Copie o texto abaixo e mande para o desenvolvedor:</p>
                                <pre className="bg-gray-100 p-4 rounded text-sm text-red-800 overflow-auto">{this.state.errorMsg}</pre>
                                <button onClick={() => window.location.reload()} className="mt-6 bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700">Recarregar Página</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- SUAS CHAVES DO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyAEJFGMGIOy2z9oeX9PQWHA0HYJbIytlg8",
          authDomain: "calendario-upli.firebaseapp.com",
          projectId: "calendario-upli",
          storageBucket: "calendario-upli.firebasestorage.app",
          messagingSenderId: "849051732172",
          appId: "1:849051732172:web:14735da6c16d19bcf71a69",
          measurementId: "G-6YXY6KY98T"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;
        
        const Download = () => <span>⬇️</span>;
        const Upload = () => <span>📤</span>;
        const Trash2 = () => <span>🗑️</span>;
        const CalendarDays = () => <span>📅</span>;
        const Edit2 = () => <span>✏️</span>;
        const LogOut = () => <span>🚪</span>;
        const DatabaseIcon = () => <span>☁️</span>;
        const MessageSquare = () => <span className="text-[10px]">💬</span>;
        const FilterIcon = () => <span>🔍</span>;
        const ImageIcon = () => <span>🖼️</span>;
        const PDFIcon = () => <span>📄</span>;
        
        const CalendarCreator = () => {
          const [user, setUser] = useState(null);
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [loadingAuth, setLoadingAuth] = useState(true);
          const [isResetMode, setIsResetMode] = useState(false); 
          
          const [currentUserName, setCurrentUserName] = useState('');
          const [showProfileModal, setShowProfileModal] = useState(false);
          const [newDisplayName, setNewDisplayName] = useState('');
          const [userRole, setUserRole] = useState('admin'); 

          useEffect(() => {
             const unsubscribe = auth.onAuthStateChanged(u => {
                 setUser(u);
                 if (u) {
                     setCurrentUserName(u.displayName || u.email);
                     const savedRole = localStorage.getItem(`role_${u.uid}`);
                     if(savedRole) setUserRole(savedRole);
                 }
                 setLoadingAuth(false);
             });
             return () => unsubscribe();
          }, []);

          const handleLogin = (e) => {
             e.preventDefault();
             auth.signInWithEmailAndPassword(email, password).catch(err => alert("Erro ao entrar: Verifique o e-mail e a senha."));
          };

          const handleLogout = () => auth.signOut();

          const handleUpdateProfile = () => {
              if (!user) return;
              user.updateProfile({ displayName: newDisplayName }).then(() => {
                  setCurrentUserName(newDisplayName);
                  localStorage.setItem(`role_${user.uid}`, userRole);
                  setShowProfileModal(false);
              }).catch(error => alert("Erro ao atualizar nome: " + error.message));
          };

          const handleResetPasswordLogged = () => {
              if (!user || !user.email) return;
              auth.sendPasswordResetEmail(user.email).then(() => {
                  alert(`E-mail de redefinição enviado para: ${user.email}.`);
                  setShowProfileModal(false);
              }).catch(error => alert("Erro ao enviar: " + error.message));
          };

          const handleForgotPasswordSubmit = (e) => {
              e.preventDefault();
              if (!email) return alert("Digite seu e-mail.");
              auth.sendPasswordResetEmail(email).then(() => {
                  alert(`Link enviado para: ${email}`);
                  setIsResetMode(false);
              }).catch(error => alert("Erro: E-mail não encontrado."));
          };

          const [year, setYear] = useState(2026);
          const [month, setMonth] = useState(2); 
          const [events, setEvents] = useState([]);
          const [colorOptions, setColorOptions] = useState([]);
          // Removido o Time, mantendo apenas Data, Texto, Cor e Notas
          const [newEvent, setNewEvent] = useState({ day: '', text: '', color: '', notes: '' });
          const [newCategory, setNewCategory] = useState({ label: '', color: '#3b82f6' });
          
          const [editingColor, setEditingColor] = useState(null);
          const [editLabel, setEditLabel] = useState('');
          const [editColorValue, setEditColorValue] = useState('');

          const [editingEventIndex, setEditingEventIndex] = useState(null);
          const [editEventForm, setEditEventForm] = useState({ day: '', text: '', color: '', notes: '' });
          const [expandedNoteIndex, setExpandedNoteIndex] = useState(null); 
          
          const [eventStatuses, setEventStatuses] = useState({});
          const [companies, setCompanies] = useState([]);
          const [selectedCompany, setSelectedCompany] = useState(null);
          const [newCompanyName, setNewCompanyName] = useState('');
          const [editingCompany, setEditingCompany] = useState(null);
          const [editCompanyName, setEditCompanyName] = useState('');
          
          const [activeFilter, setActiveFilter] = useState('ALL'); 

          useEffect(() => {
            if (!user) return;
            const unsubscribe = db.collection('companies').onSnapshot(snapshot => {
                try {
                    const fetchedCompanies = [];
                    snapshot.forEach(doc => {
                        const data = doc.data() || {};
                        fetchedCompanies.push({ 
                            id: doc.id, 
                            name: data.name || 'Nova Empresa', 
                            events: Array.isArray(data.events) ? data.events : [],
                            categories: Array.isArray(data.categories) ? data.categories : [],
                            statuses: data.statuses || {}
                        });
                    });
                    fetchedCompanies.sort((a,b) => String(a.name).localeCompare(String(b.name)));
                    setCompanies(fetchedCompanies);

                    if (!selectedCompany && fetchedCompanies.length > 0) setSelectedCompany(fetchedCompanies[0].id);
                } catch (err) { console.error("Erro:", err); }
            });
            return () => unsubscribe();
          }, [user, selectedCompany]);

          useEffect(() => {
              if (selectedCompany) {
                  const comp = companies.find(c => c.id === selectedCompany);
                  if (comp) {
                      setEvents(Array.isArray(comp.events) ? comp.events : []);
                      setColorOptions(Array.isArray(comp.categories) ? comp.categories : []);
                      setEventStatuses(comp.statuses || {});
                      setActiveFilter('ALL'); 
                  }
              } else {
                  setEvents([]); setColorOptions([]); setEventStatuses({});
              }
          }, [selectedCompany, companies]);

          const saveToCloud = (updates) => {
              if (!selectedCompany) return;
              db.collection('companies').doc(selectedCompany).set(updates, { merge: true }).catch(err => alert("Erro ao salvar na nuvem!"));
          };

          const months = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];
          const fullWeekDays = ['DOMINGO', 'SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO'];

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const toggleEventStatus = (eventIndex, status) => {
            if (userRole === 'cliente') return; 
            const eventKey = `event_${eventIndex}`;
            const current = eventStatuses[eventKey];
            const newStatuses = {...eventStatuses};
            if (current === status) delete newStatuses[eventKey];
            else newStatuses[eventKey] = status;
            saveToCloud({ statuses: newStatuses });
          };

          const getEventStatus = (eventIndex) => eventStatuses[`event_${eventIndex}`] || null;

          const getStatusColor = (originalColor, status) => {
            if (status === 'done') return '#22c55e'; 
            if (status === 'late') return '#ef4444'; 
            return originalColor || '#cccccc';
          };

          const addCompany = () => {
            if (newCompanyName.trim()) {
              const id = Date.now().toString();
              db.collection('companies').doc(id).set({ name: newCompanyName.trim(), events: [], categories: [], statuses: {} });
              setSelectedCompany(id); setNewCompanyName('');
            }
          };

          const removeCompany = (companyId) => {
            if (confirm('ATENÇÃO: Apagar a empresa e TODOS os eventos?')) {
              db.collection('companies').doc(companyId).delete();
              if (selectedCompany === companyId) setSelectedCompany(null);
            }
          };

          const startEditCompany = (company) => { setEditingCompany(company.id); setEditCompanyName(company.name); };
          const saveEditCompany = () => {
            db.collection('companies').doc(editingCompany).update({ name: editCompanyName.trim() });
            setEditingCompany(null); setEditCompanyName('');
          };
          const cancelEditCompany = () => { setEditingCompany(null); setEditCompanyName(''); };

          const getTextColor = (bgColor) => {
            if (!bgColor) return '#000000';
            const hex = bgColor.replace('#', '');
            if (hex.length < 6) return '#000000';
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 155 ? '#000000' : '#ffffff';
          };

          const addEvent = () => {
            const dayNum = parseInt(newEvent.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!newEvent.day || !newEvent.text || !newEvent.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);
            
            const updatedEvents = [...events, { ...newEvent, day: dayNum, month: month, year: year }];
            saveToCloud({ events: updatedEvents });
            setNewEvent({ day: '', text: '', color: colorOptions.length > 0 ? colorOptions[0].id : '', notes: '' });
          };

          const removeEvent = (index) => {
              const updatedEvents = events.filter((_, i) => i !== index);
              saveToCloud({ events: updatedEvents });
          };

          const startEditEvent = (event, originalIndex) => {
            setEditingEventIndex(originalIndex);
            setEditEventForm({
                day: event.day || '',
                text: event.text || '',
                color: event.color || '',
                notes: event.notes || ''
            });
          };

          const saveEditEvent = () => {
            const dayNum = parseInt(editEventForm.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!editEventForm.day || !editEventForm.text || !editEventForm.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);

            const updatedEvents = [...events];
            updatedEvents[editingEventIndex] = {
                ...updatedEvents[editingEventIndex],
                day: dayNum,
                text: editEventForm.text,
                color: editEventForm.color,
                notes: editEventForm.notes
            };
            saveToCloud({ events: updatedEvents });
            setEditingEventIndex(null);
          };

          const cancelEditEvent = () => setEditingEventIndex(null);

          const addCategory = () => {
            if (newCategory.label.trim()) {
              const updatedCats = [...colorOptions, { id: Date.now().toString(), label: newCategory.label, color: newCategory.color }];
              saveToCloud({ categories: updatedCats });
              setNewCategory({ label: '', color: '#3b82f6' });
            }
          };

          const removeCategory = (id) => {
            const updatedCats = colorOptions.filter(c => c.id !== id);
            const updatedEvts = events.filter(e => e.color !== id);
            saveToCloud({ categories: updatedCats, events: updatedEvts });
            if (editingColor === id) cancelEditCategory();
          };

          const startEditCategory = (category) => {
            setEditingColor(category.id);
            setEditLabel(category.label || '');
            setEditColorValue(category.color || '#000000');
          };

          const saveEditCategory = () => {
            const updatedCats = colorOptions.map(c => c.id === editingColor ? { ...c, label: editLabel, color: editColorValue } : c);
            saveToCloud({ categories: updatedCats });
            setEditingColor(null);
          };

          const cancelEditCategory = () => { setEditingColor(null); setEditLabel(''); setEditColorValue(''); };

          const clearAllData = () => {
            if (confirm('⚠️ Apagar TODOS os eventos desta empresa?')) saveToCloud({ events: [], categories: [], statuses: {} });
          };

          // Exportar evento como "O DIA TODO" no Google Agenda
          const exportSingleToGoogleCalendar = (event) => {
              const companyName = companies.find(c => c.id === selectedCompany)?.name || 'UPLI';
              
              // Cria a data do evento
              const startDate = new Date(year, month, event.day);
              // Para evento de dia inteiro, o Google exige que a data final seja o DIA SEGUINTE
              const endDate = new Date(year, month, event.day + 1);

              const startStr = `${startDate.getFullYear()}${String(startDate.getMonth() + 1).padStart(2, '0')}${String(startDate.getDate()).padStart(2, '0')}`;
              const endStr = `${endDate.getFullYear()}${String(endDate.getMonth() + 1).padStart(2, '0')}${String(endDate.getDate()).padStart(2, '0')}`;
              
              const dates = `${startStr}/${endStr}`;
              const title = encodeURIComponent(`[${companyName}] ${event.text}`);
              const details = encodeURIComponent(event.notes || 'Sem anotações.');
              
              window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}`, '_blank');
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const content = event.target.result;
              const lines = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);
              
              if (lines.length < 2) {
                  alert('O arquivo deve ter pelo menos 2 linhas.');
                  e.target.value = '';
                  return;
              }

              const compName = lines[0];
              let comp = companies.find(c => c.name.toLowerCase() === compName.toLowerCase());
              let compId = comp ? comp.id : Date.now().toString() + Math.random().toString(36).substr(2, 5);
              let compData = comp ? { ...comp } : { events: [], categories: [], statuses: {} };

              lines.slice(1).forEach(line => {
                const parts = line.split(';');
                if (parts.length < 3) return;

                let catName = parts[0].trim();
                let catColor = null;
                let dayNumStr, desc;

                if (parts[1].trim().startsWith('#')) {
                    catColor = parts[1].trim();
                    dayNumStr = parts[2] ? parts[2].trim() : '';
                    desc = parts.slice(3).join(';').trim();
                } else {
                    dayNumStr = parts[1].trim();
                    desc = parts.slice(2).join(';').trim();
                }

                const dayNum = parseInt(dayNumStr);
                if (!catName || isNaN(dayNum) || !desc) return;

                let category = compData.categories.find(c => c.label.toLowerCase() === catName.toLowerCase());
                if (!category) {
                  let finalColor = catColor || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                  category = { id: Date.now().toString() + Math.random().toString(36).substr(2, 5), label: catName, color: finalColor };
                  compData.categories.push(category);
                }

                compData.events.push({ day: dayNum, text: desc, color: category.id, month: month, year: year });
              });

              db.collection('companies').doc(compId).set({
                  name: compName,
                  events: compData.events,
                  categories: compData.categories,
                  statuses: compData.statuses || {}
              }, { merge: true }).then(() => {
                  setSelectedCompany(compId);
                  alert(`Eventos importados com sucesso!`);
              });

              e.target.value = ''; 
            };
            reader.readAsText(file);
          };

          const safeEvents = Array.isArray(events) ? events : [];
          const safeColorOptions = Array.isArray(colorOptions) ? colorOptions : [];

          const getFilteredEvents = () => {
              let monthEvents = safeEvents.filter(e => e.month === month && e.year === year);
              if (activeFilter === 'ALL') return monthEvents;
              if (activeFilter === 'DONE') return monthEvents.filter(e => getEventStatus(safeEvents.findIndex(ev => ev.day === e.day && ev.text === e.text && ev.month === e.month)) === 'done');
              if (activeFilter === 'LATE') return monthEvents.filter(e => getEventStatus(safeEvents.findIndex(ev => ev.day === e.day && ev.text === e.text && ev.month === e.month)) === 'late');
              return monthEvents.filter(e => e.color === activeFilter);
          };

          const getEventsForDay = (day) => getFilteredEvents().filter(e => e.day === day);
          
          const getLegendItems = () => {
            const currentEvents = safeEvents.filter(e => e.month === month && e.year === year);
            const uniqueColors = [...new Set(currentEvents.map(e => e.color))];
            return safeColorOptions.filter(c => uniqueColors.includes(c.id));
          };

          const getWeeks = () => {
            const weeks = [];
            let currentWeek = new Array(7).fill(null);
            const daysInMonth = getDaysInMonth(year, month);
            let currentDayOfWeek = getFirstDayOfMonth(year, month);

            for (let day = 1; day <= daysInMonth; day++) {
              currentWeek[currentDayOfWeek] = day;
              currentDayOfWeek++;
              if (currentDayOfWeek === 7) {
                weeks.push(currentWeek);
                currentWeek = new Array(7).fill(null);
                currentDayOfWeek = 0;
              }
            }
            if (currentDayOfWeek > 0) weeks.push(currentWeek);
            return weeks;
          };

          const getLines = (ctx, text, maxWidth) => {
            if (!text) return [];
            const words = text.split(' ');
            const lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                const word = words[i];
                const width = ctx.measureText(currentLine + " " + word).width;
                if (width < maxWidth) {
                    currentLine += " " + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
          };

          const drawCalendarToCanvas = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const weeks = getWeeks();
            const canvasWidth = 1920;
            const padding = 60;
            const contentWidth = canvasWidth - (padding * 2);
            const colWidth = contentWidth / 7;
            const eventSpacing = 8;
            
            ctx.font = 'bold 14px Arial';
            
            let totalHeight = padding; 
            totalHeight += 100; 
            totalHeight += 80; 
            
            weeks.forEach(week => {
              totalHeight += 50; 
              let maxWeekHeightCalc = 0;
              week.forEach(day => {
                if (day) {
                  const dayEvents = getEventsForDay(day);
                  let colHeight = 0;
                  dayEvents.forEach(event => {
                    let displayText = event.text || '';
                    const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                    const status = getEventStatus(originalIndex);
                    if (status === 'done') displayText += ' ✓';
                    if (status === 'late') displayText += ' ⚠';
                    const lines = getLines(ctx, displayText, (colWidth) - 40); 
                    colHeight += (lines.length * 18) + 24 + eventSpacing;
                  });
                  maxWeekHeightCalc = Math.max(maxWeekHeightCalc, colHeight);
                }
              });
              totalHeight += maxWeekHeightCalc + 30; 
            });
            
            const legendItems = getLegendItems();
            if (legendItems.length > 0) {
              totalHeight += 40; 
              const itemsPerRow = 5;
              const legendRows = Math.ceil(legendItems.length / itemsPerRow);
              totalHeight += legendRows * 45 + padding; 
            } else {
              totalHeight += padding; 
            }
            
            const finalHeight = Math.max(1080, totalHeight);

            const scale = 3; 
            canvas.width = canvasWidth * scale;
            canvas.height = finalHeight * scale;
            
            ctx.scale(scale, scale);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasWidth, finalHeight);
            
            let currentY = padding;
            
            const companyName = companies.find(c => c.id === selectedCompany)?.name || '';
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${months[month]} ${year} ${companyName ? `| ${companyName.toUpperCase()}` : ''}`, padding, currentY + 40);
            
            currentY += 100;

            ctx.textAlign = 'center';
            fullWeekDays.forEach((day, i) => {
              const x = padding + (i * colWidth);
              const pillMargin = 10;
              ctx.fillStyle = '#000000';
              ctx.beginPath();
              ctx.roundRect(x + pillMargin, currentY, colWidth - (pillMargin * 2), 50, 25);
              ctx.fill();
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 20px Arial';
              ctx.fillText(day, x + (colWidth / 2), currentY + 33);
            });
            
            currentY += 80;

            weeks.forEach(week => {
              ctx.fillStyle = '#000000';
              ctx.beginPath();
              ctx.roundRect(padding, currentY, contentWidth, 36, 18);
              ctx.fill();
              
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 22px Arial';
              ctx.textAlign = 'left';
              
              week.forEach((day, i) => {
                if (day) {
                  const x = padding + (i * colWidth);
                  ctx.fillText(day.toString(), x + 25, currentY + 25);
                }
              });
              
              currentY += 50;
              let maxWeekHeight = 0;
              
              week.forEach((day, i) => {
                if (!day) return;
                
                const dayEvents = getEventsForDay(day);
                let eventY = currentY;
                const x = padding + (i * colWidth);
                const eventMargin = 10;
                const eventW = colWidth - (eventMargin * 2);
                
                dayEvents.forEach(event => {
                  const color = safeColorOptions.find(c => c.id === event.color);
                  if (!color) return;
                  
                  const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                  const status = getEventStatus(originalIndex);
                  const finalColor = getStatusColor(color.color, status);
                  const textColor = getTextColor(finalColor);
                  
                  ctx.font = 'bold 14px Arial';
                  let displayText = event.text || '';
                  if (status === 'done') displayText += ' ✓';
                  if (status === 'late') displayText += ' ⚠';
                  
                  const lines = getLines(ctx, displayText, eventW - 20);
                  
                  const lineHeight = 18;
                  const topPadding = 12;
                  const bottomPadding = 12;
                  const totalTextHeight = lines.length * lineHeight;
                  const dynamicHeight = totalTextHeight + topPadding + bottomPadding;
                  
                  ctx.fillStyle = finalColor;
                  ctx.beginPath();
                  ctx.roundRect(x + eventMargin, eventY, eventW, dynamicHeight, 18);
                  ctx.fill();
                  
                  ctx.fillStyle = textColor;
                  ctx.textAlign = 'center';
                  
                  let textY = eventY + topPadding + 12; 

                  ctx.font = 'bold 14px Arial';
                  lines.forEach(line => {
                      ctx.fillText(line, x + (colWidth / 2), textY);
                      textY += lineHeight;
                  });
                  
                  eventY += dynamicHeight + eventSpacing;
                });
                
                maxWeekHeight = Math.max(maxWeekHeight, eventY - currentY);
              });
              
              currentY += maxWeekHeight + 30; 
            });

            if (legendItems.length > 0) {
              currentY += 40;
              ctx.fillStyle = '#000000';
              ctx.font = 'bold 24px Arial';
              ctx.textAlign = 'left';
              ctx.fillText('LEGENDA:', padding, currentY + 24);
              
              const itemsPerRow = 5;
              const itemWidth = (contentWidth - 150 - ((itemsPerRow - 1) * 10)) / itemsPerRow;
              
              legendItems.forEach((item, idx) => {
                const row = Math.floor(idx / itemsPerRow);
                const col = idx % itemsPerRow;
                const itemX = padding + 150 + (col * (itemWidth + 10));
                const itemY = currentY + (row * 45);
                
                ctx.fillStyle = item.color || '#000000';
                ctx.beginPath();
                ctx.roundRect(itemX, itemY, itemWidth, 36, 18);
                ctx.fill();
                
                ctx.fillStyle = getTextColor(item.color);
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                
                let label = item.label || '';
                while (ctx.measureText(label).width > itemWidth - 20 && label.length > 3) label = label.slice(0, -4) + '...';
                ctx.fillText(label, itemX + (itemWidth / 2), itemY + 24);
              });
            }
            
            return { canvas, finalHeight };
          };

          const exportAsImage = async () => {
            try {
              const { canvas } = drawCalendarToCanvas();
              canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa';
                link.download = `calendario-${companyName}-${months[month]}-${year}-HQ.png`;
                link.click();
                URL.revokeObjectURL(url);
              }, 'image/png', 1.0);
            } catch (error) { alert('Erro ao exportar imagem.'); }
          };

          const exportAsPDF = async () => {
            try {
              if (!window.jspdf) {
                const scriptPDF = document.createElement('script');
                scriptPDF.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                document.head.appendChild(scriptPDF);
                await new Promise((resolve) => scriptPDF.onload = resolve);
              }
              const { canvas, finalHeight } = drawCalendarToCanvas();
              const imgData = canvas.toDataURL('image/png', 1.0);
              
              const pdf = new window.jspdf.jsPDF({
                orientation: finalHeight > 1920 ? 'portrait' : 'landscape',
                unit: 'px',
                format: [1920, finalHeight],
                compress: true
              });
              
              pdf.addImage(imgData, 'PNG', 0, 0, 1920, finalHeight, '', 'FAST');
              const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa';
              pdf.save(`calendario-${companyName}-${months[month]}-${year}-HQ.pdf`);
            } catch (error) { alert('Erro ao exportar PDF.'); }
          };

          const renderCalendarUI = () => {
            const weeks = getWeeks();
            const daysInMonth = getDaysInMonth(year, month);
            const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

            return (
              <div className="bg-white rounded-xl shadow-2xl p-4 md:p-8 border border-gray-200">
                <div className="mb-6 border-b pb-4">
                  <h2 className="text-2xl md:text-4xl font-black text-gray-900 uppercase tracking-tight">
                    {months[month]} {year} <span className="text-gray-400 font-medium">|</span> {companies.find(c => c.id === selectedCompany)?.name}
                  </h2>
                </div>

                <div className="mb-6 bg-gray-50 p-3 rounded-lg border flex flex-wrap items-center gap-2">
                    <span className="text-sm font-bold text-gray-500 mr-2 flex items-center gap-1"><FilterIcon/> Filtros:</span>
                    <button onClick={() => setActiveFilter('ALL')} className={`px-3 py-1 text-xs font-bold rounded-full transition ${activeFilter === 'ALL' ? 'bg-black text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>Tudo</button>
                    <button onClick={() => setActiveFilter('DONE')} className={`px-3 py-1 text-xs font-bold rounded-full transition ${activeFilter === 'DONE' ? 'bg-green-600 text-white' : 'bg-green-100 text-green-700 hover:bg-green-200'}`}>Concluídos ✓</button>
                    <button onClick={() => setActiveFilter('LATE')} className={`px-3 py-1 text-xs font-bold rounded-full transition ${activeFilter === 'LATE' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}`}>Atrasados ⚠</button>
                    <span className="text-gray-300 mx-1">|</span>
                    {getLegendItems().map(cat => (
                        <button key={cat.id} onClick={() => setActiveFilter(cat.id)} style={activeFilter === cat.id ? { backgroundColor: cat.color, color: getTextColor(cat.color) } : {}} className={`px-3 py-1 text-xs font-bold rounded-full transition ${activeFilter !== cat.id && 'bg-gray-100 border border-gray-300 text-gray-600 opacity-70 hover:opacity-100'}`}>
                            {cat.label}
                        </button>
                    ))}
                </div>

                <div className="hidden md:block overflow-x-auto pb-4">
                  <div className="min-w-[800px]">
                    <div className="grid grid-cols-7 gap-4 mb-6">
                      {fullWeekDays.map(day => (
                        <div key={day} className="bg-black text-white text-center py-3 rounded-full font-bold text-xs md:text-sm tracking-wide shadow-md">
                          {day}
                        </div>
                      ))}
                    </div>

                    <div className="space-y-8">
                      {weeks.map((week, wIdx) => (
                        <div key={wIdx} className="flex flex-col">
                          <div className="bg-black rounded-full h-10 flex items-center px-4 mb-4 shadow-md">
                            {week.map((day, dIdx) => (
                              <div key={dIdx} className="flex-1 text-white font-bold text-lg px-2">
                                {day || ''}
                              </div>
                            ))}
                          </div>
                          
                          <div className="grid grid-cols-7 gap-4">
                            {week.map((day, dIdx) => (
                              <div key={dIdx} className="flex flex-col gap-2 min-h-[60px]">
                                {day && getEventsForDay(day).map((event, eIdx) => {
                                  const color = safeColorOptions.find(c => c.id === event.color);
                                  if (!color) return null;
                                  
                                  const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                                  const status = getEventStatus(originalIndex);
                                  const finalColor = getStatusColor(color.color, status);
                                  const textColor = getTextColor(finalColor);
                                  
                                  return (
                                    <div
                                      key={eIdx}
                                      style={{ backgroundColor: finalColor, color: textColor }}
                                      className="rounded-xl px-2 py-2 text-[10px] md:text-[11px] font-bold text-center shadow-sm cursor-pointer hover:opacity-90 flex flex-col items-center justify-center break-words whitespace-normal leading-tight relative group"
                                      onClick={() => setExpandedNoteIndex(expandedNoteIndex === originalIndex ? null : originalIndex)}
                                    >
                                      <span>
                                          {event.text}
                                          {event.notes && <span className="ml-1 text-yellow-300 drop-shadow-md"><MessageSquare /></span>}
                                          {status === 'done' && <span className="ml-1">✓</span>}
                                          {status === 'late' && <span className="ml-1">⚠</span>}
                                      </span>
                                      
                                      {expandedNoteIndex === originalIndex && event.notes && (
                                          <div className="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-48 bg-yellow-100 border-2 border-yellow-300 text-yellow-900 p-2 rounded-lg shadow-xl z-10 text-left text-xs cursor-text">
                                              <p className="font-bold border-b border-yellow-200 mb-1">Anotações:</p>
                                              <p className="whitespace-pre-wrap">{event.notes}</p>
                                          </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* --- MODO CELULAR (AGENDA VERTICAL) --- */}
                <div className="block md:hidden space-y-4 mt-2">
                  {daysArray.map(day => {
                    const dayEvents = getEventsForDay(day);
                    const date = new Date(year, month, day);
                    const dayOfWeek = fullWeekDays[date.getDay()];
                    
                    if(activeFilter !== 'ALL' && dayEvents.length === 0) return null; // Esconde dias vazios se tiver filtro

                    return (
                      <div key={day} className={`border-2 rounded-2xl p-4 shadow-sm transition ${dayEvents.length > 0 ? 'bg-white border-gray-300' : 'bg-gray-50 border-gray-100'}`}>
                        <div className="flex items-center gap-3 mb-3 border-b pb-2">
                          <span className={`w-10 h-10 flex items-center justify-center rounded-full font-black text-lg ${dayEvents.length > 0 ? 'bg-black text-white shadow-md' : 'bg-gray-200 text-gray-500'}`}>
                            {day}
                          </span>
                          <span className={`font-black text-sm uppercase tracking-wide ${dayEvents.length > 0 ? 'text-gray-800' : 'text-gray-400'}`}>
                            {dayOfWeek}
                          </span>
                        </div>
                        
                        {dayEvents.length > 0 ? (
                          <div className="flex flex-col gap-3 pl-2">
                            {dayEvents.map((event, eIdx) => {
                              const color = safeColorOptions.find(c => c.id === event.color);
                              if (!color) return null;
                              
                              const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                              const status = getEventStatus(originalIndex);
                              const finalColor = getStatusColor(color.color, status);
                              const textColor = getTextColor(finalColor);
                              
                              return (
                                <div
                                  key={eIdx}
                                  style={{ backgroundColor: finalColor, color: textColor }}
                                  className="rounded-xl px-4 py-3 text-sm font-bold shadow-md flex flex-col break-words whitespace-normal leading-tight"
                                >
                                  <span>
                                      {event.text}
                                      {status === 'done' && <span className="ml-2">✓</span>}
                                      {status === 'late' && <span className="ml-2">⚠</span>}
                                  </span>
                                  {event.notes && (
                                    <div style={{ backgroundColor: 'rgba(255,255,255,0.2)'}} className="mt-2 p-2 rounded-lg text-xs font-normal border border-white border-opacity-30">
                                        <p className="whitespace-pre-wrap">{event.notes}</p>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <p className="text-xs font-bold text-gray-400 italic pl-2">Nenhum post agendado para hoje.</p>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          };

          if (loadingAuth) return <div className="min-h-screen flex items-center justify-center bg-gray-100 font-bold text-gray-500">Carregando Nuvem...</div>;

          if (!user) {
              return (
                  <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-900 p-4">
                      <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full relative overflow-hidden">
                          <div className="text-center mb-8">
                              <span className="text-5xl">{isResetMode ? '🔐' : '📅'}</span>
                              <h2 className="text-3xl font-black mt-2 text-gray-800 tracking-tight">{isResetMode ? 'Recuperar Senha' : 'Calendário UPLI'}</h2>
                              <p className="text-gray-500 text-sm mt-1">{isResetMode ? 'Digite seu e-mail para receber o link' : 'Faça login para acessar a nuvem'}</p>
                          </div>
                          
                          {isResetMode ? (
                              <form onSubmit={handleForgotPasswordSubmit} className="space-y-4">
                                  <input type="email" placeholder="Seu e-mail cadastrado" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={email} onChange={e=>setEmail(e.target.value)} required />
                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">ENVIAR LINK</button>
                                  <div className="text-center mt-4 pt-2 border-t"><button type="button" onClick={() => setIsResetMode(false)} className="text-sm text-gray-500 hover:text-gray-800 font-bold transition">← Voltar</button></div>
                              </form>
                          ) : (
                              <form onSubmit={handleLogin} className="space-y-4">
                                  <input type="email" placeholder="E-mail de acesso" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={email} onChange={e=>setEmail(e.target.value)} required />
                                  <input type="password" placeholder="Senha" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={password} onChange={e=>setPassword(e.target.value)} required />
                                  <div className="flex justify-end"><button type="button" onClick={() => setIsResetMode(true)} className="text-sm text-blue-600 hover:text-blue-800 font-bold transition mt-1">Esqueceu a senha?</button></div>
                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">ENTRAR</button>
                              </form>
                          )}
                      </div>
                  </div>
              );
          }

          const eventsWithOriginalIndex = safeEvents.map((ev, index) => ({ ...ev, originalIndex: index }));
          const filteredMonthEventsList = getFilteredEvents().map(e => {
              const oIdx = safeEvents.findIndex(ev => ev.day === e.day && ev.text === e.text && ev.month === e.month);
              return {...e, originalIndex: oIdx};
          });

          return (
            <div className="min-h-screen bg-gray-100 p-2 md:p-8">
              
              {showProfileModal && (
                  <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                      <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full space-y-4">
                          <h3 className="text-xl font-black text-gray-800 border-b pb-2 flex items-center gap-2">👤 Meu Perfil</h3>
                          <div>
                              <label className="block text-sm font-bold text-gray-700 mb-1">Nome de Exibição</label>
                              <input type="text" value={newDisplayName} onChange={e => setNewDisplayName(e.target.value)} className="w-full border-2 border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500" placeholder="Ex: Stefany..." />
                          </div>
                          
                          <div className="pt-2">
                              <label className="block text-sm font-bold text-gray-700 mb-1">Modo de Visão</label>
                              <div className="flex bg-gray-100 p-1 rounded-lg">
                                  <button onClick={() => setUserRole('admin')} className={`flex-1 py-1 text-sm font-bold rounded-md transition ${userRole === 'admin' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Administrador</button>
                                  <button onClick={() => setUserRole('cliente')} className={`flex-1 py-1 text-sm font-bold rounded-md transition ${userRole === 'cliente' ? 'bg-white shadow text-green-600' : 'text-gray-500'}`}>Cliente (Só Ver)</button>
                              </div>
                              <p className="text-[10px] text-gray-500 mt-1 leading-tight">Cliente não vê botões de apagar e editar para não bagunçar o calendário.</p>
                          </div>

                          <div className="pt-4 flex flex-col gap-2">
                              <button onClick={handleUpdateProfile} className="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition shadow-sm">Salvar Perfil</button>
                              <button onClick={handleResetPasswordLogged} className="w-full bg-yellow-500 text-white font-bold py-2 rounded-lg hover:bg-yellow-600 transition shadow-sm">Redefinir Senha</button>
                              <button onClick={() => setShowProfileModal(false)} className="w-full bg-gray-200 text-gray-800 font-bold py-2 rounded-lg hover:bg-gray-300 transition mt-2">Fechar</button>
                          </div>
                      </div>
                  </div>
              )}

              <div className="max-w-7xl mx-auto space-y-6">
                <div className="bg-white rounded-xl p-4 md:p-6 shadow-md border border-gray-200">
                  <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-6 border-b pb-4">
                    <div>
                      <h1 className="text-2xl md:text-3xl font-black flex items-center gap-3 text-gray-800">
                        <CalendarDays /> Calendário UPLI
                      </h1>
                      <p className="text-xs text-green-600 font-bold mt-2 flex items-center gap-1"><DatabaseIcon /> Conectado à Nuvem Firebase</p>
                    </div>
                    
                    <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                      <div className="flex items-center gap-3 mr-2 bg-blue-50 border border-blue-200 px-4 py-2 rounded-xl shadow-sm w-full md:w-auto">
                          <div className="bg-blue-200 text-blue-700 w-8 h-8 flex items-center justify-center rounded-full text-lg">👤</div>
                          <div className="flex flex-col leading-tight flex-1">
                              <span className="text-sm font-black text-gray-800">{currentUserName}</span>
                              <span className={`text-[10px] font-bold uppercase tracking-widest ${userRole === 'admin' ? 'text-blue-600' : 'text-green-600'}`}>{userRole === 'admin' ? 'Administrador' : 'Modo Cliente'}</span>
                          </div>
                          <button onClick={() => { setNewDisplayName(user.displayName || ''); setShowProfileModal(true); }} className="text-blue-400 hover:text-blue-700 transition p-1 ml-1"><Edit2/></button>
                      </div>

                      <button onClick={exportAsImage} className="flex-1 md:flex-none bg-purple-600 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-purple-700 transition flex items-center justify-center gap-2 shadow-sm"><ImageIcon /> Baixar PNG</button>
                      <button onClick={exportAsPDF} className="flex-1 md:flex-none bg-purple-800 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-purple-900 transition flex items-center justify-center gap-2 shadow-sm"><PDFIcon /> Baixar PDF</button>

                      <button onClick={handleLogout} className="flex-1 md:flex-none bg-red-100 text-red-700 rounded-lg px-4 py-2 text-sm font-bold hover:bg-red-200 transition flex items-center justify-center gap-2 shadow-sm"><LogOut /> Sair</button>
                    </div>
                  </div>

                  {userRole === 'admin' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="space-y-6">
                      <div className="bg-gray-50 p-4 md:p-5 rounded-xl border border-gray-200">
                        <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">🏢 Gerenciar Empresas</h3>
                        <div className="flex flex-col sm:flex-row gap-2 mb-4">
                          <input type="text" placeholder="Nome da nova empresa..." value={newCompanyName} onChange={e => setNewCompanyName(e.target.value)} className="flex-1 border-2 border-gray-300 rounded-lg px-3 py-2 outline-none w-full" />
                          <button onClick={addCompany} className="bg-gray-800 text-white rounded-lg px-4 py-2 font-bold hover:bg-black transition w-full sm:w-auto">Adicionar</button>
                        </div>
                        {companies.map(company => (
                              <div key={company.id} className={`flex items-center justify-between border-2 rounded-lg p-2 mb-2 ${selectedCompany === company.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white'}`}>
                                    <div className="flex-1 font-bold cursor-pointer" onClick={() => setSelectedCompany(company.id)}>{company.name}</div>
                                    <button onClick={() => removeCompany(company.id)} className="text-red-500 hover:text-red-700 px-2"><Trash2 /></button>
                              </div>
                        ))}
                      </div>

                      <div className="flex flex-col sm:flex-row gap-4">
                        <select value={month} onChange={e => setMonth(parseInt(e.target.value))} className="w-full border-2 border-gray-300 rounded-lg px-3 py-3 font-bold bg-white outline-none flex-1">
                          {months.map((m, i) => <option key={i} value={i}>{m}</option>)}
                        </select>
                        <input type="number" value={year} onChange={e => setYear(parseInt(e.target.value) || 2026)} className="w-full border-2 border-gray-300 rounded-lg px-3 py-3 font-bold outline-none flex-1" />
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <h3 className="font-bold text-blue-900 mb-3 flex items-center gap-2">🎨 Categorias</h3>
                        <div className="flex flex-col sm:flex-row gap-2 mb-4">
                          <input type="text" placeholder="Categoria..." value={newCategory.label} onChange={e => setNewCategory({...newCategory, label: e.target.value})} className="flex-1 border-2 border-blue-200 rounded-lg px-3 py-2 outline-none w-full" />
                          
                          {/* CORRIGIDO O SELETOR DE COR COM BORDA E CLICK NO CELULAR */}
                          <div className="flex gap-2">
                              <input type="color" value={newCategory.color} onChange={e => setNewCategory({...newCategory, color: e.target.value})} className="w-12 h-11 rounded cursor-pointer border-2 border-blue-200 p-0 shrink-0" />
                              <button onClick={addCategory} className="bg-blue-600 text-white rounded-lg px-4 py-2 font-bold w-full sm:w-auto">Add</button>
                          </div>
                        </div>
                        <div className="flex flex-wrap gap-2">
                          {safeColorOptions.map(color => (
                              <div key={color.id} style={{backgroundColor: color.color, color: getTextColor(color.color)}} className="flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold">
                                {color.label} <button onClick={() => removeCategory(color.id)} className="ml-1 hover:text-red-900 font-black text-sm">×</button>
                              </div>
                          ))}
                        </div>
                      </div>

                      <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                        <h3 className="font-bold text-green-900 mb-3 flex items-center gap-2">📌 Adicionar Post</h3>
                        <div className="flex flex-col gap-2">
                          
                          {/* CORRIGIDO: QUEBRA DE LINHA NO CELULAR PARA O TEXTO E DIA NÃO ESPREMEREM */}
                          <div className="flex flex-col sm:flex-row gap-2">
                              <input type="number" placeholder="Dia" value={newEvent.day} onChange={e => setNewEvent({...newEvent, day: e.target.value})} className="w-full sm:w-20 border-2 border-green-200 rounded-lg px-3 py-2 text-center font-bold outline-none" />
                              <input type="text" placeholder="Título do Post..." value={newEvent.text} onChange={e => setNewEvent({...newEvent, text: e.target.value})} className="flex-1 border-2 border-green-200 rounded-lg px-3 py-2 outline-none w-full" />
                          </div>

                          <textarea placeholder="Anotações / Roteiro / Link do Drive..." value={newEvent.notes} onChange={e => setNewEvent({...newEvent, notes: e.target.value})} className="w-full border-2 border-green-200 rounded-lg px-3 py-2 outline-none text-sm h-16 resize-none"></textarea>
                          
                          <div className="flex flex-col sm:flex-row gap-2 mt-1">
                              <select value={newEvent.color} onChange={e => setNewEvent({...newEvent, color: e.target.value})} className="flex-1 border-2 border-green-200 rounded-lg px-3 py-2 font-bold bg-white w-full">
                                <option value="">Escolher cor...</option>
                                {safeColorOptions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                              </select>
                              <button onClick={addEvent} disabled={!newEvent.color || !newEvent.text || !newEvent.day} className="bg-green-600 disabled:bg-gray-400 text-white rounded-lg px-6 py-2 font-bold w-full sm:w-auto">Postar</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  )}

                  <div className="mt-8 border-t pt-6">
                    <h3 className="font-bold text-gray-800 mb-4">Gerenciar Posts (Mostrando {filteredMonthEventsList.length})</h3>
                    <div className="space-y-4 max-h-96 overflow-y-auto pr-2">
                      {filteredMonthEventsList.map((event) => {
                          const originalIndex = event.originalIndex;
                          const category = safeColorOptions.find(c => c.id === event.color);
                          if(!category) return null;
                          const status = getEventStatus(originalIndex);
                          
                          if (editingEventIndex === originalIndex) {
                            return (
                              <div key={originalIndex} className="bg-blue-50 border-2 border-blue-400 rounded-lg p-3 flex flex-col gap-2 shadow-md">
                                <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="number" placeholder="Dia" value={editEventForm.day} onChange={e => setEditEventForm({...editEventForm, day: e.target.value})} className="w-full sm:w-20 border-2 p-2 rounded-lg outline-none font-bold text-center" />
                                  <input type="text" value={editEventForm.text} onChange={e => setEditEventForm({...editEventForm, text: e.target.value})} className="flex-1 border-2 p-2 rounded-lg outline-none w-full" />
                                </div>
                                <textarea value={editEventForm.notes} onChange={e => setEditEventForm({...editEventForm, notes: e.target.value})} className="w-full border-2 p-2 rounded-lg outline-none text-sm h-16" placeholder="Anotações..."></textarea>
                                <div className="flex flex-col sm:flex-row gap-2">
                                    <select value={editEventForm.color} onChange={e => setEditEventForm({...editEventForm, color: e.target.value})} className="flex-1 border-2 p-2 rounded-lg bg-white w-full font-bold">
                                      {safeColorOptions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                    </select>
                                    <div className="flex gap-2 w-full sm:w-auto">
                                        <button onClick={saveEditEvent} className="flex-1 bg-green-500 text-white px-4 py-2 rounded-lg font-bold">Salvar</button>
                                        <button onClick={cancelEditEvent} className="flex-1 bg-gray-400 text-white px-4 py-2 rounded-lg font-bold">Cancelar</button>
                                    </div>
                                </div>
                              </div>
                            );
                          }

                          return (
                            <div key={originalIndex} className="bg-gray-50 border rounded-lg p-3 flex flex-col gap-2 transition hover:bg-white hover:shadow-md">
                              <div className="flex items-start gap-2">
                                <span className="bg-gray-200 text-gray-800 font-black text-xs px-2 py-1 rounded mt-0.5">D{event.day}</span>
                                <span style={{backgroundColor: category.color, color: getTextColor(category.color)}} className="text-xs font-bold px-2 py-1 rounded-md">{event.text}</span>
                              </div>
                              
                              {event.notes && (
                                  <div className="bg-yellow-50 text-yellow-800 text-xs p-2 rounded border border-yellow-200 flex gap-2 items-start mt-1">
                                      <MessageSquare /> <p className="whitespace-pre-wrap">{event.notes}</p>
                                  </div>
                              )}

                              {userRole === 'admin' && (
                                  <div className="flex flex-col sm:flex-row justify-between sm:items-center mt-2 gap-3 sm:gap-0">
                                    <div className="flex gap-1 w-full sm:w-auto">
                                      <button onClick={() => toggleEventStatus(originalIndex, 'done')} className={`flex-1 sm:flex-none px-3 py-1 rounded text-xs font-bold transition ${status === 'done' ? 'bg-green-600 text-white' : 'bg-green-100 text-green-700 hover:bg-green-200'}`}>✓ Feito</button>
                                      <button onClick={() => toggleEventStatus(originalIndex, 'late')} className={`flex-1 sm:flex-none px-3 py-1 rounded text-xs font-bold transition ${status === 'late' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}`}>⚠ Atraso</button>
                                    </div>
                                    <div className="flex gap-2 w-full sm:w-auto">
                                      <button onClick={() => exportSingleToGoogleCalendar(event)} className="flex-1 sm:flex-none bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded text-xs font-bold transition flex items-center justify-center gap-1">
                                          + Agenda
                                      </button>
                                      <button onClick={() => startEditEvent(event, originalIndex)} className="flex-1 sm:flex-none text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1 rounded transition font-bold"><Edit2 /></button>
                                      <button onClick={() => removeEvent(originalIndex)} className="flex-1 sm:flex-none text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1 rounded transition font-bold"><Trash2 /></button>
                                    </div>
                                  </div>
                              )}
                            </div>
                          );
                      })}
                    </div>
                  </div>
                </div>

                {selectedCompany && renderCalendarUI()}

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CalendarCreator /></ErrorBoundary>);
    </script>
</body>
</html>
