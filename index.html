        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-8">
                            <div className="bg-white p-8 rounded-xl shadow-xl border-2 border-red-500 max-w-2xl w-full">
                                <h2 className="text-2xl font-black text-red-600 mb-4">Oops! Erro na Interface.</h2>
                                <pre className="bg-gray-100 p-4 rounded text-sm text-red-800 overflow-auto">{this.state.errorMsg}</pre>
                                <button onClick={() => window.location.reload()} className="mt-6 bg-red-600 text-white px-6 py-2 rounded font-bold">Recarregar Página</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const stringToColor = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            let color = '#';
            for (let i = 0; i < 3; i++) {
                const value = (hash >> (i * 8)) & 0xFF;
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        };

        const getCleanDisplayText = (text, isCentral, compLabel) => {
            let cleanText = text || '';
            if (isCentral && compLabel) {
                const prefix1 = compLabel.toLowerCase() + ':';
                const prefix2 = compLabel.toLowerCase() + ' :';
                if (cleanText.toLowerCase().startsWith(prefix1)) {
                    cleanText = cleanText.substring(prefix1.length).trim();
                } else if (cleanText.toLowerCase().startsWith(prefix2)) {
                    cleanText = cleanText.substring(prefix2.length).trim();
                }
            }
            return cleanText;
        };

        const CalendarCreator = () => {
          const [user, setUser] = useState(null);
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');

          const [currentUserName, setCurrentUserName] = useState('');
          const [showProfileModal, setShowProfileModal] = useState(false);
          const [newDisplayName, setNewDisplayName] = useState('');
          
          const [userRole, setUserRole] = useState('cliente'); 
          const [globalRoles, setGlobalRoles] = useState({});
          const [showRolesModal, setShowRolesModal] = useState(false);
          
          const [newAccEmail, setNewAccEmail] = useState('');

          const [roleEmailInput, setRoleEmailInput] = useState('');
          const [roleSelectInput, setRoleSelectInput] = useState('admin');

          const [darkMode, setDarkMode] = useState(false);

          useEffect(() => {
             try {
                 const savedTheme = localStorage.getItem('theme');
                 if (savedTheme === 'dark') { setDarkMode(true); document.documentElement.classList.add('dark'); }
             } catch(e) {}

             const unsubscribe = auth.onAuthStateChanged(u => {
                 if (u) {
                     setUser(u);
                     setCurrentUserName(u.displayName || u.email);

                     db.collection('system').doc('roles').onSnapshot(doc => {
                         if (doc.exists) {
                             const rolesData = doc.data().userRoles || {};
                             setGlobalRoles(rolesData);
                             
                             if (u.email.toLowerCase() === MEU_EMAIL_MASTER) setUserRole('master'); 
                             else if (rolesData[u.email.toLowerCase()] === 'master') setUserRole('master'); 
                             else if (rolesData[u.email.toLowerCase()] === 'admin') setUserRole('admin'); 
                             else setUserRole('cliente'); 
                         } else {
                             if (u.email.toLowerCase() === MEU_EMAIL_MASTER) {
                                 db.collection('system').doc('roles').set({ userRoles: {} });
                                 setUserRole('master');
                             } else setUserRole('cliente');
                         }
                         setLoadingAuth(false);
                     });
                 } else {
                     setUser(null); setLoadingAuth(false);
                 }
             });
             return () => unsubscribe();
          }, []);

          const isAdmin = userRole === 'master' || userRole === 'admin';

          const handleCreateAccount = async () => {
              if (!newAccEmail || !newAccPassword) return alert("Preencha email e senha!");

              setCreatingAcc(true);
              try {
                  let secondaryApp = firebase.apps.find(app => app.name === 'Secondary') || firebase.initializeApp(firebaseConfig, 'Secondary');
                  await secondaryApp.auth().createUserWithEmailAndPassword(newAccEmail.trim().toLowerCase(), newAccPassword);
                  await secondaryApp.auth().signOut();
                  const emailToSave = newAccEmail.trim().toLowerCase();
                  const updatedRoles = { ...globalRoles, [emailToSave]: newAccRole };
                  await db.collection('system').doc('roles').set({ userRoles: updatedRoles }, { merge: true });
                  alert(`Conta ${emailToSave} criada com acesso de ${newAccRole.toUpperCase()}!`);
                  setNewAccEmail(''); setNewAccPassword('');
              } catch (error) { alert("Erro ao criar: " + error.message); }
              setCreatingAcc(false);
          };

          const handleSaveRole = () => {
              if(!roleEmailInput) return;
              const emailToSave = roleEmailInput.toLowerCase().trim();
              const updatedRoles = { ...globalRoles, [emailToSave]: roleSelectInput };
              db.collection('system').doc('roles').set({ userRoles: updatedRoles }, { merge: true }).then(() => { setRoleEmailInput(''); alert(`Permissão atualizada!`); });
          };

          const handleRemoveRole = (emailToRemove) => {
              if(emailToRemove === MEU_EMAIL_MASTER) return alert("O Mestre Original não pode ser rebaixado!");
              if(confirm(`Rebaixar ${emailToRemove} para CLIENTE?`)) {
                  const updatedRoles = { ...globalRoles };
                  delete updatedRoles[emailToRemove];
                  db.collection('system').doc('roles').set({ userRoles: updatedRoles }, { merge: true });
              }
          };

          const toggleDarkMode = () => {
              const newMode = !darkMode; setDarkMode(newMode);
              try {
                  if (newMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                  else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
              } catch(e) {}
          };

          const handleLogin = (e) => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(err => alert("Erro ao entrar. Verifique credenciais.")); };
          const handleLogout = () => auth.signOut();
          const handleUpdateProfile = () => { if(user) user.updateProfile({ displayName: newDisplayName }).then(() => { setCurrentUserName(newDisplayName); setShowProfileModal(false); }); };
          const handleResetPasswordLogged = () => { if(user) auth.sendPasswordResetEmail(user.email).then(() => { alert("E-mail de redefinição enviado."); setShowProfileModal(false); }); };
          const handleForgotPasswordSubmit = (e) => { e.preventDefault(); auth.sendPasswordResetEmail(email).then(() => { alert("Link enviado."); setIsResetMode(false); }); };

          const [year, setYear] = useState(new Date().getFullYear());
          const [month, setMonth] = useState(new Date().getMonth()); 
          const [events, setEvents] = useState([]);
          const [colorOptions, setColorOptions] = useState([]);
          
          const [newEvent, setNewEvent] = useState({ day: '', text: '', color: '', notes: '', imageUrl: '' });
          const [newCategory, setNewCategory] = useState({ label: '', color: '#3b82f6' });
          const [sendToUpliGeral, setSendToUpliGeral] = useState(true); 
          
          const [editingColor, setEditingColor] = useState(null);
          const [editLabel, setEditLabel] = useState('');
          const [editColorValue, setEditColorValue] = useState('');

          const [editingEventIndex, setEditingEventIndex] = useState(null);
          const [editEventForm, setEditEventForm] = useState({ day: '', text: '', color: '', notes: '', imageUrl: '' });
          
          const [eventStatuses, setEventStatuses] = useState({});
          const [companies, setCompanies] = useState([]);
          const [selectedCompany, setSelectedCompany] = useState(null);
          const [newCompanyName, setNewCompanyName] = useState('');
          
          const [editingCompany, setEditingCompany] = useState(null);
          const [editCompanyName, setEditCompanyName] = useState('');
          
          const [calendarFilter, setCalendarFilter] = useState('ALL'); 

          // ESTADOS DO MODO DE SELEÇÃO E IMPORTAÇÃO
          const [isSelectionMode, setIsSelectionMode] = useState(false);
          const [selectedEvents, setSelectedEvents] = useState([]); 
          
          const [showImportModal, setShowImportModal] = useState(false);
          const [importTargetCompany, setImportTargetCompany] = useState('');
          const [importFile, setImportFile] = useState(null);
          const [importToCentral, setImportToCentral] = useState(true); 
          const [importing, setImporting] = useState(false);

          useEffect(() => {
            if (!user) return;
            const unsubscribe = db.collection('companies').onSnapshot(snapshot => {
                let fetchedCompanies = [];
                let hasUpliGeral = false;
                
                snapshot.forEach(doc => {
                    if (doc.id === UPLI_GERAL_ID) hasUpliGeral = true;
                    const data = doc.data() || {};
                    let safeCategories = Array.isArray(data.categories) && data.categories.length > 0 ? data.categories : [...STANDARD_CATEGORIES];

                    fetchedCompanies.push({ 
                        id: doc.id, 
                        name: data.name || 'Empresa', 
                        events: Array.isArray(data.events) ? data.events : [],
                        categories: safeCategories,
                        statuses: data.statuses || {} 
                    });
                });

                if (!hasUpliGeral && (userRole === 'master' || userRole === 'admin')) {
                    db.collection('companies').doc(UPLI_GERAL_ID).set({
                        name: 'UPLI Geral', events: [], categories: STANDARD_CATEGORIES, statuses: {}
                    });
                }

                fetchedCompanies.sort((a,b) => {
                    if(a.id === UPLI_GERAL_ID) return -1;
                    if(b.id === UPLI_GERAL_ID) return 1;
                    return String(a.name).localeCompare(String(b.name));
                });
                
                setCompanies(fetchedCompanies);

                setSelectedCompany(prev => {
                    if (!prev && fetchedCompanies.length > 0) return fetchedCompanies[0].id;
                    if (prev && !fetchedCompanies.find(c => c.id === prev) && fetchedCompanies.length > 0) return fetchedCompanies[0].id;
                    return prev;
                });

            });
            return () => unsubscribe();
          }, [user, userRole]);

          useEffect(() => {
              if (selectedCompany) {
                  const comp = companies.find(c => c.id === selectedCompany);
                  if (comp) {
                      setEvents(Array.isArray(comp.events) ? comp.events : []);
                      setEventStatuses(comp.statuses || {});
                      setCalendarFilter('ALL'); 
                      setIsSelectionMode(false);
                      setSelectedEvents([]);

                      if (selectedCompany === UPLI_GERAL_ID) {
                          let dynamicCats = [...STANDARD_CATEGORIES];
                          companies.forEach(c => {
                              if (c.id !== UPLI_GERAL_ID) {
                                  dynamicCats.push({ id: c.id, label: c.name, color: stringToColor(c.name) });
                              }
                          });
                          setColorOptions(dynamicCats);
                      } else {
                          setColorOptions(comp.categories);
                      }
                  }
              }
          }, [selectedCompany, companies]);

          const saveToCloud = (updates) => {
              if (!selectedCompany) return;
              db.collection('companies').doc(selectedCompany).set(updates, { merge: true });
          };

          const months = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const handlePrevMonth = () => { if (month === 0) { setMonth(11); setYear(year - 1); } else { setMonth(month - 1); } };
          const handleNextMonth = () => { if (month === 11) { setMonth(0); setYear(year + 1); } else { setMonth(month + 1); } };

          const toggleEventStatus = (originalIndex, newStatus) => {
              if (!isAdmin) return;
              const updatedEvents = [...events];
              const evt = updatedEvents[originalIndex];
              
              if (evt.status === newStatus) evt.status = null;
              else evt.status = newStatus;
              
              evt.updatedBy = currentUserName;
              evt.updatedAt = new Date().toISOString();
              saveToCloud({ events: updatedEvents });

              if (selectedCompany !== UPLI_GERAL_ID) {
                  const upliGeral = companies.find(c => c.id === UPLI_GERAL_ID);
                  if (upliGeral) {
                      const upliEvents = [...upliGeral.events];
                      const linkedIdx = upliEvents.findIndex(e => e.id === evt.id || e.id === evt.id + "_clone");
                      if (linkedIdx !== -1) {
                          upliEvents[linkedIdx].status = evt.status;
                          db.collection('companies').doc(UPLI_GERAL_ID).set({ events: upliEvents }, { merge: true });
                      }
                  }
              }
          };

          const getEventStatus = (eventIndex) => { return events[eventIndex]?.status || null; };

          const addCompany = () => {
            if (newCompanyName.trim()) {
              const id = Date.now().toString();
              db.collection('companies').doc(id).set({ name: newCompanyName.trim(), events: [], categories: STANDARD_CATEGORIES, statuses: {} });
              setSelectedCompany(id); setNewCompanyName('');
            }
          };

          const removeCompany = (companyId) => {
            if (confirm('ATENÇÃO: Apagar a empresa e TODOS os eventos?')) {
              db.collection('companies').doc(companyId).delete();
              if (selectedCompany === companyId) setSelectedCompany(UPLI_GERAL_ID);
            }
          };

          const startEditCompany = (company) => { setEditingCompany(company.id); setEditCompanyName(company.name); };
          const saveEditCompany = () => {
            if(!editCompanyName.trim()) return;
            db.collection('companies').doc(editingCompany).update({ name: editCompanyName.trim() });
            setEditingCompany(null); setEditCompanyName('');
          };
          const cancelEditCompany = () => { setEditingCompany(null); setEditCompanyName(''); };

          const getTextColor = (bgColor) => {
            if (!bgColor) return '#000000';
            const hex = bgColor.replace('#', '');
            if (hex.length < 6) return '#000000';
            const r = parseInt(hex.substr(0, 2), 16); const g = parseInt(hex.substr(2, 2), 16); const b = parseInt(hex.substr(4, 2), 16);
            return ((r * 299 + g * 587 + b * 114) / 1000) > 155 ? '#000000' : '#ffffff';
          };

          const addEvent = () => {
            const dayNum = parseInt(newEvent.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!newEvent.day || !newEvent.text || !newEvent.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);
            
            const eventId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const eventToAdd = { 
                ...newEvent, 
                id: eventId,
                status: null, 
                day: dayNum, month: month, year: year,
                createdBy: currentUserName,
                createdAt: new Date().toISOString()
            };

            const updatedEvents = [...events, eventToAdd];
            saveToCloud({ events: updatedEvents });

            const selectedCat = colorOptions.find(c => c.id === newEvent.color);
            const catName = selectedCat ? selectedCat.label : '';
            const isEvento = newEvent.color === 'cat_evento' || catName.toLowerCase().includes('evento');

            if (selectedCompany !== UPLI_GERAL_ID && sendToUpliGeral && !isEvento) {
                const upliGeral = companies.find(c => c.id === UPLI_GERAL_ID);
                if (upliGeral) {
                    const formattedText = catName ? `${catName}: ${eventToAdd.text}` : eventToAdd.text;
                    const clonedEvent = { ...eventToAdd, text: formattedText, sourceCompanyId: selectedCompany, color: selectedCompany };
                    db.collection('companies').doc(UPLI_GERAL_ID).set({ events: [...upliGeral.events, clonedEvent] }, { merge: true });
                }
            }
            setNewEvent({ day: '', text: '', color: colorOptions.length > 0 ? colorOptions[0].id : '', notes: '', imageUrl: '' });
          };

          const removeEvent = (index) => {
              if (confirm("Tem certeza que quer apagar esse post?")) {
                  const evToRemove = events[index];
                  const updatedEvents = events.filter((_, i) => i !== index);
                  saveToCloud({ events: updatedEvents });
                  setEditingEventIndex(null); 
                  
                  if (selectedCompany !== UPLI_GERAL_ID) {
                      const upliGeral = companies.find(c => c.id === UPLI_GERAL_ID);
                      if (upliGeral) {
                          const upliEvents = upliGeral.events.filter(e => e.id !== evToRemove.id && e.id !== evToRemove.id + "_clone");
                          db.collection('companies').doc(UPLI_GERAL_ID).set({ events: upliEvents }, { merge: true });
                      }
                  }
              }
          };

          const startEditEvent = (event, originalIndex) => {
            setEditingEventIndex(originalIndex);
            
            let textToEdit = event.text || '';
            if (selectedCompany !== UPLI_GERAL_ID) {
                 const cat = colorOptions.find(c => c.id === event.color);
                 if (cat) {
                     const catPrefix = cat.label.toLowerCase() + ':';
                     if (textToEdit.toLowerCase().startsWith(catPrefix)) {
                         textToEdit = textToEdit.substring(catPrefix.length).trim();
                     }
                 }
            }

            setEditEventForm({
                day: event.day || '', text: textToEdit, color: event.color || '', notes: event.notes || '', imageUrl: event.imageUrl || ''
            });
          };

          const saveEditEvent = () => {
            const dayNum = parseInt(editEventForm.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!editEventForm.day || !editEventForm.text || !editEventForm.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);

            const updatedEvt = {
                ...events[editingEventIndex],
                day: dayNum, text: editEventForm.text, color: editEventForm.color, notes: editEventForm.notes, imageUrl: editEventForm.imageUrl,
                updatedBy: currentUserName, updatedAt: new Date().toISOString()
            };

            const updatedEvents = [...events];
            updatedEvents[editingEventIndex] = updatedEvt;
            saveToCloud({ events: updatedEvents });

            if (selectedCompany !== UPLI_GERAL_ID) {
                const upliGeral = companies.find(c => c.id === UPLI_GERAL_ID);
                if (upliGeral) {
                    const upliEvents = [...upliGeral.events];
                    const linkedIdx = upliEvents.findIndex(e => e.id === updatedEvt.id || e.id === updatedEvt.id + "_clone");
                    
                    const selectedCat = colorOptions.find(c => c.id === editEventForm.color);
                    const catName = selectedCat ? selectedCat.label : '';
                    const isEvento = editEventForm.color === 'cat_evento' || catName.toLowerCase().includes('evento');

                    if (isEvento) {

                ctx.fillStyle = val.bg; ctx.beginPath(); ctx.roundRect(itemX, itemY, statusItemWidth, 36, 8); ctx.fill();
                ctx.fillStyle = val.text; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                let label = val.label || ''; while (ctx.measureText(label).width > statusItemWidth - 10 && label.length > 3) label = label.slice(0, -4) + '...';
                ctx.fillText(label.toUpperCase(), itemX + (statusItemWidth / 2), itemY + 18);
            });

            return { canvas, finalHeight };
          };

          const exportAsImage = async () => { try { const { canvas } = drawCalendarToCanvas(); canvas.toBlob((blob) => { const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa'; link.download = `calendario-${companyName}-${months[month]}-${year}-HQ.png`; link.click(); URL.revokeObjectURL(url); }, 'image/png', 1.0); } catch (error) { alert('Erro ao exportar imagem.'); } };
          const exportAsPDF = async () => { try { if (!window.jspdf) { const scriptPDF = document.createElement('script'); scriptPDF.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'; document.head.appendChild(scriptPDF); await new Promise((resolve) => scriptPDF.onload = resolve); } const { canvas, finalHeight } = drawCalendarToCanvas(); const imgData = canvas.toDataURL('image/png', 1.0); const pdf = new window.jspdf.jsPDF({ orientation: finalHeight > 1920 ? 'portrait' : 'landscape', unit: 'px', format: [1920, finalHeight], compress: true }); pdf.addImage(imgData, 'PNG', 0, 0, 1920, finalHeight, '', 'FAST'); const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa'; pdf.save(`calendario-${companyName}-${months[month]}-${year}-HQ.pdf`); } catch (error) { alert('Erro ao exportar PDF.'); } };

          if (loadingAuth) return <div className="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900 font-bold text-gray-500">Carregando Nuvem...</div>;

          if (!user) {
              return (
                  <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-900 p-4">
                      <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full relative overflow-hidden">
                          <div className="text-center mb-8">
                              <span className="text-5xl">{isResetMode ? '🔐' : '📅'}</span>
                              <h2 className="text-3xl font-black mt-2 text-gray-800 tracking-tight">{isResetMode ? 'Recuperar Senha' : 'Calendário UPLI'}</h2>
                              <p className="text-gray-500 text-sm mt-1">{isResetMode ? 'Digite seu e-mail para receber o link' : 'Faça login para acessar a nuvem'}</p>
                          </div>
                          {isResetMode ? (
                              <form onSubmit={handleForgotPasswordSubmit} className="space-y-4">
                                  <input type="email" placeholder="Seu e-mail cadastrado" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={email} onChange={e=>setEmail(e.target.value)} required />
                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">ENVIAR LINK</button>
                                  <div className="text-center mt-4 pt-2 border-t"><button type="button" onClick={() => setIsResetMode(false)} className="text-sm text-gray-500 hover:text-gray-800 font-bold transition">← Voltar</button></div>
                              </form>
                          ) : (
                              <form onSubmit={handleLogin} className="space-y-4">
                                  <input type="email" placeholder="E-mail de acesso" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={email} onChange={e=>setEmail(e.target.value)} required />
                                  <input type="password" placeholder="Senha" className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" value={password} onChange={e=>setPassword(e.target.value)} required />
                                  <div className="flex justify-end"><button type="button" onClick={() => setIsResetMode(true)} className="text-sm text-blue-600 hover:text-blue-800 font-bold transition mt-1">Esqueceu a senha?</button></div>
                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">ENTRAR</button>
                              </form>
                          )}
                      </div>
                  </div>
              );
          }

          const daysInMonth = getDaysInMonth(year, month);
          const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);
          const weeks = getWeeks();
          const isCentral = selectedCompany === UPLI_GERAL_ID;

          return (
            <div className={`min-h-screen p-2 md:p-8 transition-colors duration-300 ${darkMode ? 'bg-gray-900 text-white' : 'bg-gray-100 text-black'}`}>
              
              {/* MODAL DE IMPORTAÇÃO */}
              {showImportModal && (
                  <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                      <div className="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-2xl max-w-sm w-full relative">
                          <button onClick={() => { setShowImportModal(false); setImportFile(null); setImportTargetCompany(''); }} className="absolute top-4 right-4 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white w-8 h-8 rounded-full font-black hover:bg-red-500 hover:text-white transition">X</button>
                          <h3 className="font-black text-xl mb-4 text-indigo-600 dark:text-indigo-400 flex items-center gap-2"><Upload/> Importar Posts</h3>
                          
                          <div className="space-y-4">
                              <div>
                                  <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Para qual empresa deseja importar?</label>
                                  <select value={importTargetCompany} onChange={e => setImportTargetCompany(e.target.value)} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2 rounded-lg font-bold outline-none dark:bg-gray-700 dark:text-white">
                                      <option value="">Selecione uma empresa...</option>
                                      {companies.filter(c => c.id !== UPLI_GERAL_ID).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                  </select>
                              </div>
                              
                              <div>
                                  <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Selecione o arquivo (.txt)</label>
                                  <input type="file" accept=".txt" onChange={e => setImportFile(e.target.files[0])} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2 rounded-lg text-sm dark:bg-gray-700 dark:text-white cursor-pointer" />
                              </div>
                              
                              <div>
                                  <label className="flex items-center gap-2 text-xs font-bold text-gray-600 dark:text-gray-300 cursor-pointer bg-indigo-50 dark:bg-indigo-900 p-2 rounded-lg border border-indigo-100 dark:border-indigo-600">
                                      <input type="checkbox" checked={importToCentral} onChange={e => setImportToCentral(e.target.checked)} className="w-4 h-4 cursor-pointer" />

                                  </label>
                              </div>

                              <button onClick={processImport} disabled={importing || !importFile || !importTargetCompany} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-black text-lg shadow-md hover:bg-indigo-700 transition disabled:opacity-50 mt-4">

                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {editingEventIndex !== null && !isSelectionMode && (
                  <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4 backdrop-blur-sm">

                          <button onClick={() => setEditingEventIndex(null)} className="absolute top-4 right-4 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white w-8 h-8 rounded-full font-black hover:bg-red-500 hover:text-white transition">X</button>
                          <h3 className="font-black text-xl mb-4 text-gray-800 dark:text-white flex items-center gap-2"><Edit2/> Detalhes do Post</h3>

                              <div className="space-y-4">
                                  <div className="flex gap-2">
                                      <div className="w-24">
                                          <label className="block text-xs font-bold text-gray-500 mb-1">Dia</label>

                                      </div>
                                      <div className="flex-1">
                                          <label className="block text-xs font-bold text-gray-500 mb-1">Título</label>
                                          <input type="text" value={editEventForm.text} onChange={e=>setEditEventForm({...editEventForm, text: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2 rounded-lg outline-none dark:bg-gray-700 dark:text-white" />
                                      </div>
                                  </div>

                                  </div>
                                  <div>
                                      <label className="block text-xs font-bold text-gray-500 mb-1 flex items-center gap-1">🔗 Link da Arte</label>
                                      <input type="url" value={editEventForm.imageUrl} onChange={e=>setEditEventForm({...editEventForm, imageUrl: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2 rounded-lg text-sm outline-none dark:bg-gray-700 dark:text-white" placeholder="https://..."/>
                                  </div>
                                  <div>
                                      <label className="block text-xs font-bold text-gray-500 mb-1">Categoria</label>
                                      <select value={editEventForm.color} onChange={e=>setEditEventForm({...editEventForm, color: e.target.value})} className="w-full border-2 border-gray-300 dark:border-gray-600 p-2 rounded-lg font-bold outline-none dark:bg-gray-700 dark:text-white">

                                  <p className="text-lg font-black"><strong className="text-gray-500 text-sm font-bold">Título:</strong> {editEventForm.text}</p>

                                  {editEventForm.imageUrl && <a href={editEventForm.imageUrl} target="_blank" className="text-blue-600 dark:text-blue-400 font-bold underline text-sm mt-2 inline-block">🔗 Acessar Link da Arte</a>}
                              </div>

                          <div className="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">

                              <div className="flex flex-wrap justify-center gap-2">
                                  {Object.entries(STATUS_PIPELINE).map(([key, val]) => {
                                      const isActive = getEventStatus(editingEventIndex) === key;

                                          <button
                                              key={key}
                                              onClick={() => toggleEventStatus(editingEventIndex, key)}

                                                  backgroundColor: isActive ? val.bg : 'transparent',
                                                  color: isActive ? val.text : (darkMode ? '#D1D5DB' : '#4B5563'),

                                          </button>

                              </div>
                          )}
                      </div>
                  </div>
              )}

              {/* MODAL DE PERFIL RESTRITO */}
              {showProfileModal && (
                  <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                      <div className="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-2xl max-w-sm w-full space-y-4">
                          <h3 className="text-xl font-black text-gray-800 dark:text-white border-b dark:border-gray-700 pb-2 flex items-center gap-2">👤 Meu Perfil</h3>
                          <div className="bg-blue-50 dark:bg-gray-700 p-3 rounded-lg border dark:border-gray-600 text-center mb-4">
                              <p className="text-xs text-gray-500 dark:text-gray-400 font-bold uppercase">Nível de Acesso</p>
                              <p className="text-lg font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">{userRole === 'master' ? '👑 Master' : userRole === 'admin' ? '🛡️ Administrador' : '🔒 Cliente'}</p>
                          </div>
                          <div>
                              <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nome de Exibição</label>
                              <input type="text" value={newDisplayName} onChange={e => setNewDisplayName(e.target.value)} className="w-full border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 outline-none focus:border-blue-500" placeholder="Ex: Stefany..." />
                          </div>
                          <div className="pt-4 flex flex-col gap-2">
                              <button onClick={handleUpdateProfile} className="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition shadow-sm">Salvar Nome</button>
                              <button onClick={handleResetPasswordLogged} className="w-full bg-yellow-500 text-white font-bold py-2 rounded-lg hover:bg-yellow-600 transition shadow-sm">Redefinir Senha</button>
                              <button onClick={() => setShowProfileModal(false)} className="w-full bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-white font-bold py-2 rounded-lg hover:bg-gray-300 transition mt-2">Fechar</button>
                          </div>
                      </div>
                  </div>
              )}

              {/* PAINEL SECRETO DO MASTER */}
              {showRolesModal && userRole === 'master' && (
                  <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                      <div className="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-2xl max-w-lg w-full space-y-4 max-h-[90vh] overflow-y-auto">
                          <h3 className="text-xl font-black text-gray-800 dark:text-white border-b dark:border-gray-700 pb-2 flex items-center gap-2">👑 Painel da Diretoria</h3>
                          
                          <div className="bg-blue-50 dark:bg-gray-700 p-4 rounded-xl border border-blue-200 dark:border-gray-600 shadow-sm">
                              <h4 className="font-black text-blue-800 dark:text-blue-300 mb-3 flex items-center gap-2">➕ Criar Nova Conta</h4>
                              <div className="flex gap-2 mb-2">
                                  <input type="email" value={newAccEmail} onChange={e => setNewAccEmail(e.target.value)} className="w-full border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg px-3 py-2 outline-none text-sm" placeholder="E-mail" />
                                  <input type="text" value={newAccPassword} onChange={e => setNewAccPassword(e.target.value)} className="w-full border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg px-3 py-2 outline-none text-sm" placeholder="Senha (Min 6)" />
                              </div>
                              <select value={newAccRole} onChange={e => setNewAccRole(e.target.value)} className="w-full border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg px-3 py-2 outline-none font-bold mb-3 text-sm">
                                  <option value="master">Master (Dono)</option>
                                  <option value="admin">Administrador (Pode editar tudo)</option>
                                  <option value="cliente">Cliente (Somente visualizar)</option>
                              </select>
                              <button onClick={handleCreateAccount} disabled={creatingAcc} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md disabled:opacity-50 flex justify-center items-center gap-2">
                                  {creatingAcc ? 'Sincronizando...' : 'Criar Conta e Liberar Acesso'}
                              </button>
                          </div>

                          <div className="bg-gray-50 dark:bg-gray-900 p-4 rounded-xl border dark:border-gray-700 mt-4">
                              <h4 className="font-bold text-gray-700 dark:text-gray-300 mb-2 text-sm">Alterar cargo de uma conta existente:</h4>
                              <div className="flex flex-col sm:flex-row gap-2">
                                  <input type="email" value={roleEmailInput} onChange={e => setRoleEmailInput(e.target.value)} className="flex-1 border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg px-2 py-1 outline-none text-sm" placeholder="E-mail" />
                                  <select value={roleSelectInput} onChange={e => setRoleSelectInput(e.target.value)} className="border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg px-2 py-1 outline-none font-bold text-sm">
                                      <option value="master">Master</option>
                                      <option value="admin">Admin</option>
                                      <option value="cliente">Cliente</option>
                                  </select>
                                  <button onClick={handleSaveRole} className="bg-gray-800 dark:bg-gray-600 text-white font-bold px-4 py-2 rounded-lg text-sm shadow-sm">Salvar</button>
                              </div>
                          </div>

                          <div className="mt-4">
                              <h4 className="font-bold text-sm text-gray-700 dark:text-gray-300 mb-2 border-b dark:border-gray-700 pb-1">Lista de Acessos:</h4>
                              <div className="space-y-2">
                                  {Object.keys(globalRoles).map(email => (
                                      <div key={email} className="flex justify-between items-center bg-gray-50 dark:bg-gray-900 p-2 rounded border dark:border-gray-700 shadow-sm">
                                          <div className="flex flex-col">
                                              <span className="font-bold text-sm dark:text-gray-200">{email}</span>
                                              <span className={`text-[10px] font-black uppercase ${globalRoles[email] === 'master' ? 'text-yellow-600' : globalRoles[email] === 'admin' ? 'text-blue-500' : 'text-green-500'}`}>
                                                  {globalRoles[email] === 'master' ? '👑 Master' : globalRoles[email]}
                                              </span>
                                          </div>
                                          {email !== MEU_EMAIL_MASTER && (
                                              <button onClick={() => handleRemoveRole(email)} className="text-red-500 hover:text-red-700 text-xs font-bold bg-red-50 border border-red-100 dark:border-red-900 dark:bg-red-900 px-3 py-2 rounded-lg transition">Rebaixar</button>
                                          )}
                                      </div>
                                  ))}
                              </div>
                          </div>

                          <button onClick={() => setShowRolesModal(false)} className="w-full bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-white font-bold py-3 rounded-lg hover:bg-gray-300 transition mt-4">Fechar Painel</button>
                      </div>
                  </div>
              )}

              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* CABEÇALHO SUPERIOR LIMPO */}
                <div className="bg-white dark:bg-gray-800 rounded-xl p-4 md:p-6 shadow-md border border-gray-200 dark:border-gray-700 transition-colors duration-300">
                  <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                    
                    <div className="flex items-center w-full md:w-auto justify-between md:justify-start">
                        <div>
                          <h1 className="text-2xl md:text-3xl font-black flex items-center gap-3 text-gray-800 dark:text-white">
                            <CalendarDays /> Calendário UPLI
                          </h1>
                          <p className="text-xs text-green-600 font-bold mt-2 flex items-center gap-1"><DatabaseIcon /> Nuvem Online</p>
                        </div>
                        
                        <div className="block md:hidden flex items-center gap-2">
                            <button onClick={toggleDarkMode} className="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-xl transition shadow-sm">
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                            <button onClick={handleLogout} className="bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 rounded-lg p-2 transition shadow-sm"><LogOut /></button>
                        </div>
                    </div>
                    
                    <div className="hidden md:flex flex-wrap items-center gap-2">
                      <button onClick={toggleDarkMode} className="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-xl transition hover:scale-110 shadow-sm" title="Alternar Tema">
                          {darkMode ? '☀️' : '🌙'}
                      </button>

                      {userRole === 'master' && (
                          <button onClick={() => setShowRolesModal(true)} className="bg-yellow-400 text-yellow-900 font-bold px-4 py-2 rounded-lg shadow-sm hover:bg-yellow-500 transition flex items-center gap-2">
                              <KeyIcon /> Acessos
                          </button>
                      )}

                      <div className="flex items-center gap-3 mr-2 bg-blue-50 dark:bg-gray-700 border border-blue-200 dark:border-gray-600 px-4 py-2 rounded-xl shadow-sm">
                          <div className="bg-blue-200 dark:bg-gray-600 text-blue-700 dark:text-blue-300 w-8 h-8 flex items-center justify-center rounded-full text-lg">👤</div>
                          <div className="flex flex-col leading-tight">
                              <span className="text-sm font-black text-gray-800 dark:text-white">{currentUserName}</span>
                              <span className={`text-[10px] font-bold uppercase tracking-widest ${userRole === 'master' ? 'text-yellow-600 dark:text-yellow-400' : userRole === 'admin' ? 'text-blue-600 dark:text-blue-400' : 'text-green-600 dark:text-green-400'}`}>
                                  {userRole === 'master' ? 'Master' : userRole === 'admin' ? 'Admin' : 'Cliente'}
                              </span>
                          </div>
                          <button onClick={() => setShowProfileModal(true)} className="text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition p-1 ml-1"><Edit2/></button>
