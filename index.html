                          <button onClick={exportAsPDF} className="bg-purple-800 text-white rounded-lg px-3 py-2 text-sm font-bold hover:bg-purple-900 transition flex items-center gap-1 shadow-sm"><PDFIcon /> PDF HD</button>
                          <button onClick={handleLogout} className="bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 rounded-lg px-3 py-2 text-sm font-bold hover:bg-red-200 dark:hover:bg-red-800 transition flex items-center gap-1 shadow-sm"><LogOut /> Sair</button>
                      </div>
                    </div>
                  </div>
                </div>

                {/* PAINEL DE ADMINISTRAÇÃO */}
                {isAdmin && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <div className="space-y-6">
                    <div className="bg-white dark:bg-gray-800 p-4 md:p-6 rounded-xl shadow-md border border-gray-200 dark:border-gray-700">
                      <h3 className="font-bold text-gray-800 dark:text-white mb-3 flex items-center gap-2">🏢 Gerenciar Empresas</h3>
                      <div className="flex flex-col sm:flex-row gap-2 mb-4">
                        <input type="text" placeholder="Nome da nova empresa..." value={newCompanyName} onChange={e => setNewCompanyName(e.target.value)} className="flex-1 border-2 border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 outline-none w-full" />
                        <button onClick={addCompany} className="bg-gray-800 dark:bg-gray-600 text-white rounded-lg px-4 py-2 font-bold hover:bg-black dark:hover:bg-gray-500 transition w-full sm:w-auto">Adicionar</button>
                      </div>
                      <div className="max-h-64 overflow-y-auto pr-2 space-y-2">
                          {companies.map(company => (
                                <div key={company.id} className={`flex items-center justify-between border-2 rounded-lg p-2 ${selectedCompany === company.id ? 'border-blue-500 bg-blue-50 dark:bg-blue-900' : 'border-gray-200 bg-gray-50 dark:bg-gray-900 dark:border-gray-700'}`}>
                                    {editingCompany === company.id ? (
                                        <div className="flex flex-1 items-center gap-2 mr-2">
                                            <input type="text" value={editCompanyName} onChange={e=>setEditCompanyName(e.target.value)} className="w-full border-2 border-blue-400 rounded px-2 py-1 text-black font-bold outline-none" />
                                            <button onClick={saveEditCompany} className="bg-green-500 text-white px-3 py-1 rounded font-bold hover:bg-green-600">✓</button>
                                            <button onClick={cancelEditCompany} className="bg-gray-400 text-white px-3 py-1 rounded font-bold hover:bg-gray-500">X</button>
                                        </div>
                                    ) : (
                                        <div className="flex-1 font-bold cursor-pointer dark:text-white px-2 py-1 flex items-center gap-2" onClick={() => setSelectedCompany(company.id)}>
                                            {company.id === UPLI_GERAL_ID ? '👑 ' : ''}{company.name}
                                        </div>
                                    )}
                                    
                                    <div className="flex items-center gap-1">
                                        {company.id !== UPLI_GERAL_ID && (
                                            <button onClick={() => startEditCompany(company)} className="text-blue-500 hover:text-blue-700 bg-blue-100 hover:bg-blue-200 p-2 rounded-lg transition"><Edit2 /></button>
                                        )}
                                        {company.id !== UPLI_GERAL_ID && (
                                            <button onClick={() => removeCompany(company.id)} className="text-red-500 hover:text-red-700 bg-red-100 hover:bg-red-200 p-2 rounded-lg transition ml-1"><Trash2 /></button>
                                        )}
                                    </div>
                                </div>
                          ))}
                      </div>
                    </div>
                  </div>

                  <div className="space-y-6">
                    <div className="bg-white dark:bg-gray-800 p-4 md:p-6 rounded-xl shadow-md border border-blue-200 dark:border-gray-700">
                      <h3 className="font-bold text-blue-600 dark:text-blue-400 mb-3 flex items-center gap-2">🎨 Categorias do Calendário</h3>
                      {!isCentral ? (
                          <>
                              <div className="flex flex-col sm:flex-row gap-2 mb-4">
                                <input type="text" placeholder="Nova Categoria..." value={newCategory.label} onChange={e => setNewCategory({...newCategory, label: e.target.value})} className="flex-1 border-2 border-blue-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 outline-none w-full" />
                                <div className="flex gap-2">
                                    <input type="color" value={newCategory.color} onChange={e => setNewCategory({...newCategory, color: e.target.value})} className="w-12 h-11 rounded cursor-pointer border-2 border-blue-200 p-0 shrink-0" />
                                    <button onClick={addCategory} className="bg-blue-600 text-white rounded-lg px-4 py-2 font-bold w-full sm:w-auto hover:bg-blue-700">Adicionar</button>
                                </div>
                              </div>
                              <div className="flex flex-wrap gap-2">
                                {safeColorOptions.map(color => {
                                    if (editingColor === color.id) {
                                        return (
                                            <div key={color.id} className="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 p-1 rounded-lg border border-blue-300 dark:border-blue-600 shadow-inner">
                                                <input type="color" value={editColorValue} onChange={e => setEditColorValue(e.target.value)} className="w-6 h-6 rounded cursor-pointer border-0 p-0" />
                                                <input type="text" value={editLabel} onChange={e => setEditLabel(e.target.value)} className="w-24 text-xs font-bold border border-gray-300 dark:border-gray-600 rounded px-2 py-1 outline-none text-black dark:text-white dark:bg-gray-700" />
                                                <button onClick={saveEditCategory} className="bg-green-500 text-white rounded px-2 py-1 text-xs font-bold shadow-sm hover:bg-green-600">✓</button>
                                                <button onClick={cancelEditCategory} className="bg-gray-400 text-white rounded px-2 py-1 text-xs font-bold shadow-sm hover:bg-gray-500">X</button>
                                            </div>
                                        );
                                    }
                                    return (
                                        <div key={color.id} style={{backgroundColor: color.color, color: getTextColor(color.color)}} className="flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold shadow-sm group transition-transform hover:scale-105">
                                          {color.label}
                                          <div className="flex items-center ml-1 border-l border-white border-opacity-30 pl-1 gap-1">
                                              <button onClick={() => startEditCategory(color)} className="opacity-70 hover:opacity-100 font-black text-[10px] drop-shadow-md" title="Editar Nome/Cor">✏️</button>
                                              <button onClick={() => removeCategory(color.id)} className="opacity-70 hover:opacity-100 font-black text-[12px] drop-shadow-md" title="Apagar">×</button>
                                          </div>
                                        </div>
                                    );
                                })}
                              </div>
                          </>
                      ) : (
                          <p className="text-sm text-gray-500 dark:text-gray-400 italic">As categorias do UPLI Geral são geradas automaticamente com base no nome das outras empresas criadas.</p>
                      )}
                    </div>

                    <div className="bg-white dark:bg-gray-800 p-4 md:p-6 rounded-xl shadow-md border border-green-200 dark:border-gray-700">
                      <h3 className="font-bold text-green-600 dark:text-green-400 mb-3 flex items-center gap-2">📌 Adicionar Post</h3>
                      <div className="flex flex-col gap-3">
                        <div className="flex flex-col sm:flex-row gap-2">
                            <input type="number" placeholder="Dia" value={newEvent.day} onChange={e => setNewEvent({...newEvent, day: e.target.value})} className="w-full sm:w-20 border-2 border-green-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 text-center font-bold outline-none" />
                            <input type="text" placeholder="Título do Post..." value={newEvent.text} onChange={e => setNewEvent({...newEvent, text: e.target.value})} className="flex-1 border-2 border-green-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 outline-none w-full" />
                        </div>
                        
                        <textarea placeholder="Anotações / Roteiro..." value={newEvent.notes} onChange={e => setNewEvent({...newEvent, notes: e.target.value})} className="w-full border-2 border-green-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 outline-none text-sm h-12 resize-none"></textarea>
                        
                        <div className="bg-gray-50 dark:bg-gray-900 p-2 rounded-lg border-2 border-green-200 dark:border-gray-600 flex items-center gap-2">
                            <span className="text-xl">🔗</span>
                            <div className="flex-1">
                                <label className="block text-[10px] font-bold text-gray-500 dark:text-gray-400">Link da Imagem / Arte (Opcional)</label>
                                <input type="url" placeholder="Cole o link do Drive, Canva, etc..." value={newEvent.imageUrl} onChange={(e) => setNewEvent({...newEvent, imageUrl: e.target.value})} className="w-full text-xs text-gray-800 dark:text-white p-1 border-b outline-none bg-transparent dark:border-gray-600" />
                            </div>
                        </div>

                        {!isCentral && (
                            <label className="flex items-center gap-2 text-xs font-bold text-gray-600 dark:text-gray-300 cursor-pointer bg-blue-50 dark:bg-gray-900 p-2 rounded-lg border border-blue-100 dark:border-gray-600">
                                <input type="checkbox" checked={sendToUpliGeral} onChange={e => setSendToUpliGeral(e.target.checked)} className="w-4 h-4 cursor-pointer" />
                                Enviar cópia para o Calendário Central (UPLI Geral)
                            </label>
                        )}

                        <div className="flex flex-col sm:flex-row gap-2 mt-1">
                            <select value={newEvent.color} onChange={e => setNewEvent({...newEvent, color: e.target.value})} className="flex-1 border-2 border-green-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg px-3 py-2 font-bold w-full outline-none">
                              <option value="">Escolher categoria...</option>
                              {safeColorOptions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                            </select>
                            <button onClick={addEvent} disabled={!newEvent.color || !newEvent.text || !newEvent.day} className="bg-green-600 disabled:bg-gray-400 text-white rounded-lg px-8 py-2 font-black w-full sm:w-auto shadow-md hover:bg-green-700 transition uppercase tracking-wide">Postar</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                )}

                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-4 md:p-8 border border-gray-200 dark:border-gray-700 transition-colors duration-300">
                  
                  {/* PAINEL DE MODO DE SELEÇÃO */}
                  {isSelectionMode && (
                      <div className="bg-indigo-100 dark:bg-indigo-900 border-2 border-indigo-400 p-4 rounded-xl mb-6 shadow-md transition-all">
                          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                              <div className="flex-1">
                                  <h3 className="font-black text-indigo-800 dark:text-indigo-200 flex items-center gap-2">🛠️ MODO DE SELEÇÃO ATIVADO</h3>
                                  <p className="text-sm text-indigo-600 dark:text-indigo-300">Clique nos posts para selecionar ou use os atalhos por categoria abaixo.</p>
                                  <div className="flex flex-wrap gap-2 mt-3 items-center">
                                      {getLegendItems().map(cat => (
                                          <button 
                                              key={cat.id} 
                                              onClick={() => toggleCategorySelection(cat.id)}
                                              style={{ backgroundColor: cat.color, color: getTextColor(cat.color) }}
                                              className="px-3 py-1.5 text-[10px] font-black rounded-lg shadow-sm hover:scale-105 transition-transform uppercase"
                                          >
                                              + {cat.label}
                                          </button>
                                      ))}
                                  </div>
                              </div>
                              <div className="text-right flex flex-col items-start md:items-end w-full md:w-auto gap-3">
                                  <span className="font-black text-2xl text-indigo-700 dark:text-indigo-300">{selectedEvents.length} selecionados</span>
                                  <div className="flex flex-wrap gap-2 w-full justify-end">
                                      <button onClick={exportSelectedToTXT} disabled={selectedEvents.length === 0} className="flex-1 md:flex-none bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700 disabled:opacity-50 transition flex items-center justify-center gap-2"><Download/> Exportar TXT</button>
                                      <button onClick={deleteSelectedEvents} disabled={selectedEvents.length === 0} className="flex-1 md:flex-none bg-red-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-red-700 disabled:opacity-50 transition flex items-center justify-center gap-2"><Trash2/> Apagar</button>
                                  </div>
                              </div>
                          </div>
                      </div>
                  )}

                  {/* NAVEGAÇÃO E BOTÕES (CENTRO DO CALENDÁRIO) */}
                  <div className="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-gray-200 dark:border-gray-700 pb-4 gap-4">
                    
                    <div className="flex items-center gap-4 bg-gray-50 dark:bg-gray-900 p-2 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm w-full md:w-auto justify-between md:justify-start">
                        <button onClick={handlePrevMonth} className="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition text-2xl font-black">⬅️</button>
                        <h2 className="text-2xl md:text-3xl font-black text-gray-900 dark:text-white uppercase tracking-tight text-center min-w-[150px] md:min-w-[200px]">
                          {months[month]} {year}
                        </h2>
                        <button onClick={handleNextMonth} className="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition text-2xl font-black">➡️</button>
                    </div>

                    {isAdmin && (
                        <div className="flex flex-wrap items-center justify-center gap-2 flex-1 mx-2">
                            <button onClick={() => setShowImportModal(true)} className="bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-indigo-700 transition flex items-center justify-center gap-2 shadow-sm" title="Importar arquivo TXT para qualquer calendário">
                                <Upload /> Importar
                            </button>
                            
                            <button onClick={handleSelectionToggle} className={`${isSelectionMode ? 'bg-gray-600 hover:bg-gray-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white rounded-lg px-4 py-2 text-sm font-bold transition flex items-center justify-center gap-2 shadow-sm`} title="Selecionar posts">
                                <MultiSelectIcon /> {isSelectionMode ? `Cancelar Seleção` : 'Selecionar'}
                            </button>
                        </div>
                    )}

                    <h3 className="text-xl md:text-3xl font-black text-blue-600 dark:text-blue-400 uppercase bg-blue-50 dark:bg-gray-900 px-6 py-3 rounded-xl border border-blue-100 dark:border-gray-700 shadow-sm whitespace-nowrap w-full md:w-auto text-center">
                        {companies.find(c => c.id === selectedCompany)?.name}
                    </h3>
                  </div>

                  {/* FILTRO DE STATUS */}
                  <div className="mb-6 bg-gray-50 dark:bg-gray-900 p-3 rounded-lg border border-gray-200 dark:border-gray-700 flex flex-wrap items-center gap-2 shadow-sm">
                      <span className="text-sm font-bold text-gray-500 dark:text-gray-400 mr-2 flex items-center gap-1"><FilterIcon/> Filtros:</span>
                      <button onClick={() => setCalendarFilter('ALL')} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition ${calendarFilter === 'ALL' ? 'bg-black text-white dark:bg-white dark:text-black shadow-md' : 'bg-gray-200 text-gray-700 hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-300'}`}>Tudo</button>
                      <span className="text-gray-300 dark:text-gray-600 mx-1">|</span>
                      {Object.entries(STATUS_PIPELINE).map(([key, val]) => (
                          <button key={key} onClick={() => setCalendarFilter(key)} style={{backgroundColor: calendarFilter === key ? val.bg : 'transparent', color: calendarFilter === key ? val.text : (darkMode ? '#9CA3AF' : '#4B5563'), border: `2px solid ${val.bg}`}} className={`px-3 py-1 text-xs font-bold rounded-lg transition ${calendarFilter === key ? 'shadow-md scale-105' : 'hover:opacity-70'}`}>
                              {val.label}
                          </button>
                      ))}
                  </div>

                  <div className="hidden md:block overflow-x-auto pb-4">
                    <div className="min-w-[800px]">
                      <div className="grid grid-cols-7 gap-4 mb-4">
                        {fullWeekDays.map(day => (
                          <div key={day} className="bg-black dark:bg-gray-700 text-white text-center py-3 rounded-full font-bold text-xs md:text-sm tracking-wide shadow-md">
                            {day}
                          </div>
                        ))}
                      </div>

                      <div className="space-y-4">
                        {weeks.map((week, wIdx) => (
                          <div key={wIdx} className="flex flex-col">
                            <div className="bg-gray-200 dark:bg-gray-700 rounded-t-xl h-10 flex items-center px-4 shadow-sm">
                              {week.map((day, dIdx) => (
                                <div key={dIdx} className="flex-1 text-gray-800 dark:text-gray-200 font-black text-sm px-2 text-center border-r border-gray-300 dark:border-gray-600 last:border-0">
                                  {day || ''}
                                </div>
                              ))}
                            </div>
                            
                            <div className="grid grid-cols-7 gap-2 bg-gray-50 dark:bg-gray-900 border-x border-b border-gray-200 dark:border-gray-700 rounded-b-xl p-2 min-h-[120px] shadow-sm">
                              {week.map((day, dIdx) => (
                                <div 
                                  key={dIdx} 
                                  className="flex flex-col gap-2 p-1 min-h-[100px] rounded-lg transition-colors hover:bg-gray-100 dark:hover:bg-gray-800 relative"
                                  onDragOver={onDragOver}
                                  onDrop={(e) => day ? onDrop(e, day) : null}
                                >
                                  {day && getCalendarEventsForDay(day).map((event, eIdx) => {
                                    const color = safeColorOptions.find(c => c.id === event.color);
                                    if (!color) return null;
                                    
                                    const originalIndex = event._origIdx;
                                    const eventKey = event._key;
                                    const status = getEventStatus(originalIndex);
                                    
                                    let finalBgColor = color.color;
                                    let finalTextColor = getTextColor(color.color);

                                    if (isCentral) {
                                        if (status && STATUS_PIPELINE[status]) {
                                            finalBgColor = STATUS_PIPELINE[status].bg;
                                            finalTextColor = STATUS_PIPELINE[status].text;
                                        } else {
                                            finalBgColor = darkMode ? '#374151' : '#E5E7EB'; 
                                            finalTextColor = darkMode ? '#D1D5DB' : '#374151';
                                        }
                                    }
                                    
                                    const isSelected = selectedEvents.includes(eventKey);

                                    return (
                                      <div
                                        key={eIdx}
                                        draggable={isAdmin && !isSelectionMode}
                                        onDragStart={(e) => onDragStart(e, originalIndex)}
                                        style={{ backgroundColor: finalBgColor, color: finalTextColor }}
                                        className={`rounded-2xl p-3 text-[11px] font-bold shadow-md relative group transition-all 
                                            ${isAdmin ? 'cursor-pointer' : ''} 
                                            ${isCentral ? 'flex flex-row items-center gap-2 text-left' : 'flex flex-col text-center justify-center'}
                                            ${isSelectionMode && isSelected ? 'ring-4 ring-indigo-500 scale-105' : ''}
                                            ${isSelectionMode && !isSelected ? 'opacity-50 hover:opacity-100' : 'hover:scale-105'}
                                        `}
                                        onClick={() => {
                                            if(isSelectionMode) toggleEventSelection(eventKey);
                                            else if(isAdmin) startEditEvent(event, originalIndex);
                                        }}
                                      >
                                        {isSelectionMode && isSelected && (
                                            <div className="absolute -top-2 -right-2 bg-indigo-600 text-white rounded-full w-5 h-5 flex items-center justify-center font-black z-10 shadow-lg"><CheckIcon/></div>
                                        )}

                                        {/* A BOLINHA NO UPLI GERAL (DESIGN PÍLULA) */}
                                        {isCentral && (
                                            <div className="w-3.5 h-3.5 rounded-full flex-shrink-0 shadow-inner border border-white border-opacity-50" style={{ backgroundColor: color.color }} title={`Categoria: ${color.label}`}></div>
                                        )}

                                        <div className={`flex flex-col ${isCentral ? 'flex-1 overflow-hidden' : 'items-center w-full'}`}>
                                            {event.imageUrl && !isCentral && (
                                                <div className="mb-1 text-[10px] bg-black bg-opacity-20 rounded text-white flex items-center justify-center p-1 w-fit mx-auto shadow-sm" title="Possui Anexo"><ImageIcon /></div>
                                            )}
                                            
                                            {/* TEXTO 100% VISÍVEL COM QUEBRA DE LINHA NATURAL */}
                                            <span className="leading-snug whitespace-normal break-words block w-full">
                                                {getCleanDisplayText(event.text, isCentral, color.label)}
                                                {event.notes && !isCentral && <span className="ml-1 drop-shadow-md"><MessageSquare /></span>}
                                            </span>

                                            {/* ETIQUETA DE STATUS PARA O CALENDÁRIO DO CLIENTE */}
                                            {!isCentral && status && STATUS_PIPELINE[status] && (
                                                <div className="mt-1 text-[9px] px-1.5 py-0.5 rounded-md inline-block font-black uppercase tracking-wider shadow-sm mx-auto w-fit" style={{ backgroundColor: STATUS_PIPELINE[status].bg, color: STATUS_PIPELINE[status].text }}>
                                                    {STATUS_PIPELINE[status].label}
                                                </div>
                                            )}
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* VISÃO CELULAR */}
                  <div className="block md:hidden space-y-4 mt-2">
                    {daysArray.map(day => {
                      const dayEvents = getCalendarEventsForDay(day);
                      const date = new Date(year, month, day);
                      const dayOfWeek = fullWeekDays[date.getDay()];
                      
                      if(calendarFilter !== 'ALL' && dayEvents.length === 0) return null; 

                      return (
                        <div key={day} 
                             className={`border-2 rounded-2xl p-4 shadow-sm transition dark:border-gray-700 ${dayEvents.length > 0 ? 'bg-white dark:bg-gray-800 border-gray-300' : 'bg-gray-50 dark:bg-gray-900 border-gray-100'}`}
                             onDragOver={onDragOver}
                             onDrop={(e) => day ? onDrop(e, day) : null}
                        >
                          <div className="flex items-center gap-3 mb-3 border-b border-gray-200 dark:border-gray-700 pb-2">
                            <span className={`w-10 h-10 flex items-center justify-center rounded-full font-black text-lg ${dayEvents.length > 0 ? 'bg-black text-white dark:bg-white dark:text-black shadow-md' : 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'}`}>
                              {day}
                            </span>
                            <span className={`font-black text-sm uppercase tracking-wide ${dayEvents.length > 0 ? 'text-gray-800 dark:text-gray-200' : 'text-gray-400 dark:text-gray-500'}`}>
                              {dayOfWeek}
                            </span>
                          </div>
                          
                          {dayEvents.length > 0 ? (
                            <div className="flex flex-col gap-3 pl-2">
                              {dayEvents.map((event, eIdx) => {
                                const color = safeColorOptions.find(c => c.id === event.color);
                                if (!color) return null;
                                
                                const originalIndex = event._origIdx;
                                const eventKey = event._key;
                                const status = getEventStatus(originalIndex);
                                
                                let finalBgColor = color.color;
                                let finalTextColor = getTextColor(color.color);

                                if (isCentral) {
                                    if (status && STATUS_PIPELINE[status]) {
                                        finalBgColor = STATUS_PIPELINE[status].bg;
                                        finalTextColor = STATUS_PIPELINE[status].text;
                                    } else {
                                        finalBgColor = darkMode ? '#374151' : '#E5E7EB'; 
                                        finalTextColor = darkMode ? '#D1D5DB' : '#374151';
                                    }
                                }

                                const isSelected = selectedEvents.includes(eventKey);
                                
                                return (
                                  <div
                                    key={eIdx}
                                    draggable={isAdmin && !isSelectionMode}
                                    onDragStart={(e) => onDragStart(e, originalIndex)}
                                    style={{ backgroundColor: finalBgColor, color: finalTextColor }}
                                    className={`rounded-2xl px-4 py-3 text-sm font-bold shadow-md flex break-words whitespace-normal leading-tight relative cursor-pointer transition-all
                                        ${isCentral ? 'flex-row items-center gap-3 text-left' : 'flex-col text-center'}
                                        ${isSelectionMode && isSelected ? 'ring-4 ring-indigo-500 scale-105' : ''}
                                        ${isSelectionMode && !isSelected ? 'opacity-50' : ''}
                                    `}
                                    onClick={() => {
                                        if(isSelectionMode) toggleEventSelection(eventKey);
                                        else if(isAdmin) startEditEvent(event, originalIndex);
                                    }}
                                  >
                                    {isSelectionMode && isSelected && (
                                        <div className="absolute -top-2 -right-2 bg-indigo-600 text-white rounded-full w-6 h-6 flex items-center justify-center font-black z-10 shadow-lg"><CheckIcon/></div>
                                    )}

                                    {isCentral && (
                                        <div className="w-5 h-5 rounded-full shadow-inner border border-white border-opacity-50 flex-shrink-0" style={{ backgroundColor: color.color }}></div>
                                    )}

                                    <div className={`flex flex-col ${isCentral ? 'flex-1' : 'w-full items-center'}`}>
                                        {event.imageUrl && !isCentral && (
                                            <div className="mb-2 flex flex-col gap-1 mt-1">
                                                <a href={event.imageUrl} target="_blank" className="text-[10px] bg-black bg-opacity-20 hover:bg-opacity-30 text-white rounded px-2 py-1 inline-flex items-center gap-1 w-fit transition shadow-sm" onClick={e => e.stopPropagation()}>🔗 Ver Arte</a>
                                            </div>
                                        )}
                                        <span className="text-base block w-full whitespace-normal break-words">
                                            {getCleanDisplayText(event.text, isCentral, color.label)}
                                        </span>
                                        {event.notes && !isCentral && (
                                            <div className="mt-2 p-3 rounded-lg text-xs font-normal border border-white border-opacity-30 shadow-inner w-full text-left" style={{ backgroundColor: 'rgba(255,255,255,0.2)'}}>
                                                <p className="whitespace-pre-wrap">{event.notes}</p>
                                            </div>
                                        )}
                                        {!isCentral && status && STATUS_PIPELINE[status] && (
                                            <div className="mt-2 text-[10px] px-2 py-1 rounded-md inline-block font-black uppercase tracking-wider w-fit shadow-sm" style={{ backgroundColor: STATUS_PIPELINE[status].bg, color: STATUS_PIPELINE[status].text }}>
                                                {STATUS_PIPELINE[status].label}
                                            </div>
                                        )}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          ) : (
                            <p className="text-xs font-bold text-gray-400 dark:text-gray-500 italic pl-2">Nenhum post agendado ou solte aqui...</p>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* DUAS LEGENDAS: CATEGORIAS E STATUS (CORRIGIDAS) */}
                  {getLegendItems().length > 0 && (
                    <div className="mt-8 md:mt-12 pt-6 border-t border-gray-200 dark:border-gray-700">
                      <h3 className="font-bold text-lg md:text-xl mb-4 text-gray-800 dark:text-white">LEGENDA DE CATEGORIAS / EMPRESAS</h3>
                      <div className="flex flex-wrap gap-2 md:gap-3">
                        {getLegendItems().map(item => (
                          <div key={item.id} style={{ backgroundColor: item.color || '#000000', color: getTextColor(item.color) }} className="rounded-full px-4 md:px-6 py-2 text-xs md:text-sm font-bold shadow-md border border-black border-opacity-10">
                            {item.label}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
                    <h3 className="font-bold text-lg md:text-xl mb-4 text-gray-800 dark:text-white">STATUS DE PRODUÇÃO</h3>
                    <div className="flex flex-wrap gap-2 md:gap-3">
                        {Object.entries(STATUS_PIPELINE).map(([key, val]) => (
                            <div key={key} style={{ backgroundColor: val.bg, color: val.text }} className="rounded-md px-4 md:px-6 py-2 text-xs md:text-sm font-black shadow-md uppercase tracking-wider">
                                {val.label}
                            </div>
                        ))}
                    </div>
                  </div>
                  
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CalendarCreator /></ErrorBoundary>);
    </script>
</body>
</html>
