<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Calendário de Conteúdo - UPLI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body className="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        // --- RADAR DE ERROS ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.toString() }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-8">
                            <div className="bg-white p-8 rounded-xl shadow-xl border-2 border-red-500 max-w-2xl w-full">
                                <h2 className="text-2xl font-black text-red-600 mb-4">Oops! Algo bloqueou a tela.</h2>
                                <p className="text-gray-700 mb-4">Copie o texto abaixo e mande para o desenvolvedor:</p>
                                <pre className="bg-gray-100 p-4 rounded text-sm text-red-800 overflow-auto">{this.state.errorMsg}</pre>
                                <button onClick={() => window.location.reload()} className="mt-6 bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700">Recarregar Página</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- SUAS CHAVES DO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyAEJFGMGIOy2z9oeX9PQWHA0HYJbIytlg8",
          authDomain: "calendario-upli.firebaseapp.com",
          projectId: "calendario-upli",
          storageBucket: "calendario-upli.firebasestorage.app",
          messagingSenderId: "849051732172",
          appId: "1:849051732172:web:14735da6c16d19bcf71a69",
          measurementId: "G-6YXY6KY98T"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;
        
        const Download = () => <span>⬇️</span>;
        const Upload = () => <span>📤</span>;
        const Trash2 = () => <span>🗑️</span>;
        const CalendarDays = () => <span>📅</span>;
        const Edit2 = () => <span>✏️</span>;
        const LogOut = () => <span>🚪</span>;
        const Clock = () => <span className="mr-1 opacity-80">⏰</span>;
        const DatabaseIcon = () => <span>☁️</span>;
        
        const CalendarCreator = () => {
          // --- SISTEMA DE LOGIN E PERFIL ---
          const [user, setUser] = useState(null);
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [loadingAuth, setLoadingAuth] = useState(true);
          const [isResetMode, setIsResetMode] = useState(false); // Controla se a tela é de Login ou Recuperação
          
          const [currentUserName, setCurrentUserName] = useState('');
          const [showProfileModal, setShowProfileModal] = useState(false);
          const [newDisplayName, setNewDisplayName] = useState('');

          useEffect(() => {
             const unsubscribe = auth.onAuthStateChanged(u => {
                 setUser(u);
                 if (u) {
                     setCurrentUserName(u.displayName || u.email);
                 }
                 setLoadingAuth(false);
             });
             return () => unsubscribe();
          }, []);

          const handleLogin = (e) => {
             e.preventDefault();
             auth.signInWithEmailAndPassword(email, password).catch(err => {
                 alert("Erro ao entrar: Verifique o e-mail e a senha.");
             });
          };

          const handleLogout = () => auth.signOut();

          const handleUpdateProfile = () => {
              if (!user) return;
              user.updateProfile({
                  displayName: newDisplayName
              }).then(() => {
                  setCurrentUserName(newDisplayName);
                  setShowProfileModal(false);
                  alert("Nome de usuário atualizado com sucesso!");
              }).catch(error => {
                  alert("Erro ao atualizar nome: " + error.message);
              });
          };

          // Função para recuperar senha de quem JÁ ESTÁ LOGADO (pelo modal de perfil)
          const handleResetPasswordLogged = () => {
              if (!user || !user.email) return;
              auth.sendPasswordResetEmail(user.email).then(() => {
                  alert(`Um e-mail de redefinição de senha foi enviado para: ${user.email}. Verifique sua caixa de entrada (e o Spam)!`);
                  setShowProfileModal(false);
              }).catch(error => {
                  alert("Erro ao enviar e-mail: " + error.message);
              });
          };

          // Função para recuperar senha NA TELA DE LOGIN (quando não está logado)
          const handleForgotPasswordSubmit = (e) => {
              e.preventDefault();
              if (!email) {
                  alert("Por favor, digite o seu e-mail.");
                  return;
              }
              auth.sendPasswordResetEmail(email).then(() => {
                  alert(`O link de recuperação foi enviado para: ${email}\n\nVerifique sua caixa de entrada e a pasta de Spam!`);
                  setIsResetMode(false); // Volta pra tela normal de login automaticamente
              }).catch(error => {
                  if (error.code === 'auth/user-not-found') {
                      alert("Erro: Este e-mail não está cadastrado no sistema.");
                  } else {
                      alert("Erro ao tentar recuperar a senha: " + error.message);
                  }
              });
          };

          // --- ESTADOS DO CALENDÁRIO ---
          const [year, setYear] = useState(2026);
          const [month, setMonth] = useState(2); 
          const [events, setEvents] = useState([]);
          const [colorOptions, setColorOptions] = useState([]);
          const [newEvent, setNewEvent] = useState({ day: '', time: '', text: '', color: '' });
          const [newCategory, setNewCategory] = useState({ label: '', color: '#3b82f6' });
          
          const [editingColor, setEditingColor] = useState(null);
          const [editLabel, setEditLabel] = useState('');
          const [editColorValue, setEditColorValue] = useState('');

          const [editingEventIndex, setEditingEventIndex] = useState(null);
          const [editEventForm, setEditEventForm] = useState({ day: '', time: '', text: '', color: '' });
          
          const [eventStatuses, setEventStatuses] = useState({});
          const [companies, setCompanies] = useState([]);
          const [selectedCompany, setSelectedCompany] = useState(null);
          const [newCompanyName, setNewCompanyName] = useState('');
          const [editingCompany, setEditingCompany] = useState(null);
          const [editCompanyName, setEditCompanyName] = useState('');

          useEffect(() => {
            if (!user) return;
            const unsubscribe = db.collection('companies').onSnapshot(snapshot => {
                try {
                    const fetchedCompanies = [];
                    snapshot.forEach(doc => {
                        const data = doc.data() || {};
                        fetchedCompanies.push({ 
                            id: doc.id, 
                            name: data.name || 'Nova Empresa', 
                            events: Array.isArray(data.events) ? data.events : [],
                            categories: Array.isArray(data.categories) ? data.categories : [],
                            statuses: data.statuses || {}
                        });
                    });
                    
                    fetchedCompanies.sort((a,b) => String(a.name).localeCompare(String(b.name)));
                    setCompanies(fetchedCompanies);

                    if (!selectedCompany && fetchedCompanies.length > 0) {
                        setSelectedCompany(fetchedCompanies[0].id);
                    }
                } catch (err) {
                    console.error("Erro ao processar dados:", err);
                }
            }, error => {
                console.error("Erro de permissão no Firestore:", error);
            });
            return () => unsubscribe();
          }, [user, selectedCompany]);

          useEffect(() => {
              if (selectedCompany) {
                  const comp = companies.find(c => c.id === selectedCompany);
                  if (comp) {
                      setEvents(Array.isArray(comp.events) ? comp.events : []);
                      setColorOptions(Array.isArray(comp.categories) ? comp.categories : []);
                      setEventStatuses(comp.statuses || {});
                  }
              } else {
                  setEvents([]); setColorOptions([]); setEventStatuses({});
              }
          }, [selectedCompany, companies]);

          const saveToCloud = (updates) => {
              if (!selectedCompany) return;
              db.collection('companies').doc(selectedCompany).set(updates, { merge: true }).catch(err => alert("Erro ao salvar na nuvem!"));
          };

          const months = [
            'JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO',
            'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'
          ];
          const fullWeekDays = ['DOMINGO', 'SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO'];

          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

          const toggleEventStatus = (eventIndex, status) => {
            const eventKey = `event_${eventIndex}`;
            const current = eventStatuses[eventKey];
            const newStatuses = {...eventStatuses};
            if (current === status) delete newStatuses[eventKey];
            else newStatuses[eventKey] = status;
            
            saveToCloud({ statuses: newStatuses });
          };

          const getEventStatus = (eventIndex) => eventStatuses[`event_${eventIndex}`] || null;

          const getStatusColor = (originalColor, status) => {
            if (status === 'done') return '#22c55e'; 
            if (status === 'late') return '#ef4444'; 
            return originalColor || '#cccccc';
          };

          const addCompany = () => {
            if (newCompanyName.trim()) {
              const id = Date.now().toString();
              db.collection('companies').doc(id).set({
                  name: newCompanyName.trim(),
                  events: [],
                  categories: [],
                  statuses: {}
              });
              setSelectedCompany(id);
              setNewCompanyName('');
            }
          };

          const removeCompany = (companyId) => {
            if (confirm('⚠️ ATENÇÃO: Isso apagará a empresa e TODOS os eventos para sempre. Tem certeza?')) {
              db.collection('companies').doc(companyId).delete();
              if (selectedCompany === companyId) setSelectedCompany(null);
            }
          };

          const startEditCompany = (company) => { setEditingCompany(company.id); setEditCompanyName(company.name); };
          const saveEditCompany = () => {
            db.collection('companies').doc(editingCompany).update({ name: editCompanyName.trim() });
            setEditingCompany(null); setEditCompanyName('');
          };
          const cancelEditCompany = () => { setEditingCompany(null); setEditCompanyName(''); };

          const getTextColor = (bgColor) => {
            if (!bgColor) return '#000000';
            const hex = bgColor.replace('#', '');
            if (hex.length < 6) return '#000000';
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 155 ? '#000000' : '#ffffff';
          };

          const addEvent = () => {
            const dayNum = parseInt(newEvent.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!newEvent.day || !newEvent.text || !newEvent.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);
            
            const updatedEvents = [...events, { ...newEvent, day: dayNum, month: month, year: year }];
            saveToCloud({ events: updatedEvents });
            setNewEvent({ day: '', time: '', text: '', color: colorOptions.length > 0 ? colorOptions[0].id : '' });
          };

          const removeEvent = (index) => {
              const updatedEvents = events.filter((_, i) => i !== index);
              saveToCloud({ events: updatedEvents });
          };

          const startEditEvent = (event, originalIndex) => {
            setEditingEventIndex(originalIndex);
            setEditEventForm({
                day: event.day || '',
                time: event.time || '',
                text: event.text || '',
                color: event.color || ''
            });
          };

          const saveEditEvent = () => {
            const dayNum = parseInt(editEventForm.day);
            const daysInCurrentMonth = getDaysInMonth(year, month);
            if (!editEventForm.day || !editEventForm.text || !editEventForm.color) return alert('Preencha os campos obrigatórios!');
            if (dayNum < 1 || dayNum > daysInCurrentMonth) return alert(`Dia inválido!`);

            const updatedEvents = [...events];
            updatedEvents[editingEventIndex] = {
                ...updatedEvents[editingEventIndex],
                day: dayNum,
                time: editEventForm.time,
                text: editEventForm.text,
                color: editEventForm.color
            };
            saveToCloud({ events: updatedEvents });
            setEditingEventIndex(null);
          };

          const cancelEditEvent = () => setEditingEventIndex(null);

          const addCategory = () => {
            if (newCategory.label.trim()) {
              const updatedCats = [...colorOptions, { id: Date.now().toString(), label: newCategory.label, color: newCategory.color }];
              saveToCloud({ categories: updatedCats });
              setNewCategory({ label: '', color: '#3b82f6' });
            }
          };

          const removeCategory = (id) => {
            const updatedCats = colorOptions.filter(c => c.id !== id);
            const updatedEvts = events.filter(e => e.color !== id);
            saveToCloud({ categories: updatedCats, events: updatedEvts });
            if (editingColor === id) cancelEditCategory();
          };

          const startEditCategory = (category) => {
            setEditingColor(category.id);
            setEditLabel(category.label || '');
            setEditColorValue(category.color || '#000000');
          };

          const saveEditCategory = () => {
            const updatedCats = colorOptions.map(c => c.id === editingColor ? { ...c, label: editLabel, color: editColorValue } : c);
            saveToCloud({ categories: updatedCats });
            setEditingColor(null);
          };

          const cancelEditCategory = () => { setEditingColor(null); setEditLabel(''); setEditColorValue(''); };

          const clearAllData = () => {
            if (confirm('⚠️ Apagar TODOS os eventos e categorias desta empresa?')) {
                saveToCloud({ events: [], categories: [], statuses: {} });
            }
          };

          const exportData = () => {
            const dataStr = JSON.stringify({ events, categories: colorOptions, exportDate: new Date().toISOString() }, null, 2);
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([dataStr], { type: 'application/json' }));
            const compName = companies.find(c => c.id === selectedCompany)?.name || 'backup';
            link.download = `backup-${compName}-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const content = event.target.result;
              const lines = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);
              
              if (lines.length < 2) {
                  alert('O arquivo deve ter pelo menos 2 linhas.');
                  e.target.value = '';
                  return;
              }

              const compName = lines[0];
              let comp = companies.find(c => c.name.toLowerCase() === compName.toLowerCase());
              let compId = comp ? comp.id : Date.now().toString() + Math.random().toString(36).substr(2, 5);
              let compData = comp ? { ...comp } : { events: [], categories: [], statuses: {} };

              lines.slice(1).forEach(line => {
                const parts = line.split(';');
                if (parts.length < 3) return;

                let catName = parts[0].trim();
                let catColor = null;
                let dayNumStr, timeStr, desc;

                if (parts[1].trim().startsWith('#')) {
                    catColor = parts[1].trim();
                    dayNumStr = parts[2] ? parts[2].trim() : '';
                    if (parts.length === 4) { timeStr = ''; desc = parts[3].trim(); }
                    else if (parts.length > 4) { timeStr = parts[3].trim(); desc = parts.slice(4).join(';').trim(); }
                    else return;
                } else {
                    dayNumStr = parts[1].trim();
                    if (parts.length === 3) { timeStr = ''; desc = parts[2].trim(); }
                    else if (parts.length > 3) { timeStr = parts[2].trim(); desc = parts.slice(3).join(';').trim(); }
                    else return;
                }

                const dayNum = parseInt(dayNumStr);
                if (!catName || isNaN(dayNum) || !desc) return;

                let category = compData.categories.find(c => c.label.toLowerCase() === catName.toLowerCase());
                if (!category) {
                  let finalColor = catColor || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                  category = { id: Date.now().toString() + Math.random().toString(36).substr(2, 5), label: catName, color: finalColor };
                  compData.categories.push(category);
                }

                compData.events.push({ day: dayNum, time: timeStr, text: desc, color: category.id, month: month, year: year });
              });

              db.collection('companies').doc(compId).set({
                  name: compName,
                  events: compData.events,
                  categories: compData.categories,
                  statuses: compData.statuses || {}
              }, { merge: true }).then(() => {
                  setSelectedCompany(compId);
                  alert(`Eventos importados com sucesso!`);
              });

              e.target.value = ''; 
            };
            reader.readAsText(file);
          };

          const safeEvents = Array.isArray(events) ? events : [];
          const safeColorOptions = Array.isArray(colorOptions) ? colorOptions : [];

          const getEventsForDay = (day) => safeEvents.filter(e => e.day === day && e.month === month && e.year === year);
          const getLegendItems = () => {
            const currentEvents = safeEvents.filter(e => e.month === month && e.year === year);
            const uniqueColors = [...new Set(currentEvents.map(e => e.color))];
            return safeColorOptions.filter(c => uniqueColors.includes(c.id));
          };

          const getWeeks = () => {
            const weeks = [];
            let currentWeek = new Array(7).fill(null);
            const daysInMonth = getDaysInMonth(year, month);
            let currentDayOfWeek = getFirstDayOfMonth(year, month);

            for (let day = 1; day <= daysInMonth; day++) {
              currentWeek[currentDayOfWeek] = day;
              currentDayOfWeek++;
              if (currentDayOfWeek === 7) {
                weeks.push(currentWeek);
                currentWeek = new Array(7).fill(null);
                currentDayOfWeek = 0;
              }
            }
            if (currentDayOfWeek > 0) weeks.push(currentWeek);
            return weeks;
          };

          const getLines = (ctx, text, maxWidth) => {
            if (!text) return [];
            const words = text.split(' ');
            const lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                const word = words[i];
                const width = ctx.measureText(currentLine + " " + word).width;
                if (width < maxWidth) {
                    currentLine += " " + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
          };

          const drawCalendarToCanvas = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const weeks = getWeeks();
            const canvasWidth = 1920;
            const padding = 60;
            const contentWidth = canvasWidth - (padding * 2);
            const colWidth = contentWidth / 7;
            const eventSpacing = 8;
            
            ctx.font = 'bold 14px Arial';
            
            let totalHeight = padding; 
            totalHeight += 100; 
            totalHeight += 80; 
            
            weeks.forEach(week => {
              totalHeight += 50; 
              let maxWeekHeightCalc = 0;
              
              week.forEach(day => {
                if (day) {
                  const dayEvents = getEventsForDay(day);
                  let colHeight = 0;
                  
                  dayEvents.forEach(event => {
                    let displayText = event.text || '';
                    if (event.time) displayText = `⏰ ${event.time} ` + displayText;
                    
                    const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                    const status = getEventStatus(originalIndex);
                    if (status === 'done') displayText += ' ✓';
                    if (status === 'late') displayText += ' ⚠';
                    
                    const lines = getLines(ctx, displayText, (colWidth) - 40); 
                    
                    const dynamicHeight = (lines.length * 18) + 24; 
                    colHeight += dynamicHeight + eventSpacing;
                  });
                  maxWeekHeightCalc = Math.max(maxWeekHeightCalc, colHeight);
                }
              });
              totalHeight += maxWeekHeightCalc + 30; 
            });
            
            const legendItems = getLegendItems();
            if (legendItems.length > 0) {
              totalHeight += 40; 
              const itemsPerRow = 5;
              const legendRows = Math.ceil(legendItems.length / itemsPerRow);
              totalHeight += legendRows * 45; 
              totalHeight += padding; 
            } else {
              totalHeight += padding; 
            }
            
            const finalHeight = Math.max(1080, totalHeight);
            canvas.width = canvasWidth;
            canvas.height = finalHeight;
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasWidth, finalHeight);
            
            let currentY = padding;
            
            const companyName = companies.find(c => c.id === selectedCompany)?.name || '';
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${months[month]} ${year} ${companyName ? `| ${companyName.toUpperCase()}` : ''}`, padding, currentY + 40);
            
            currentY += 100;

            ctx.textAlign = 'center';
            fullWeekDays.forEach((day, i) => {
              const x = padding + (i * colWidth);
              const pillMargin = 10;
              
              ctx.fillStyle = '#000000';
              ctx.beginPath();
              ctx.roundRect(x + pillMargin, currentY, colWidth - (pillMargin * 2), 50, 25);
              ctx.fill();
              
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 20px Arial';
              ctx.fillText(day, x + (colWidth / 2), currentY + 33);
            });
            
            currentY += 80;

            weeks.forEach(week => {
              ctx.fillStyle = '#000000';
              ctx.beginPath();
              ctx.roundRect(padding, currentY, contentWidth, 36, 18);
              ctx.fill();
              
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 22px Arial';
              ctx.textAlign = 'left';
              
              week.forEach((day, i) => {
                if (day) {
                  const x = padding + (i * colWidth);
                  ctx.fillText(day.toString(), x + 25, currentY + 25);
                }
              });
              
              currentY += 50;
              let maxWeekHeight = 0;
              
              week.forEach((day, i) => {
                if (!day) return;
                
                const dayEvents = getEventsForDay(day);
                let eventY = currentY;
                const x = padding + (i * colWidth);
                const eventMargin = 10;
                const eventW = colWidth - (eventMargin * 2);
                
                dayEvents.forEach(event => {
                  const color = safeColorOptions.find(c => c.id === event.color);
                  if (!color) return;
                  
                  const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                  const status = getEventStatus(originalIndex);
                  const finalColor = getStatusColor(color.color, status);
                  const textColor = getTextColor(finalColor);
                  
                  ctx.font = 'bold 14px Arial';
                  let displayText = event.text || '';
                  if (event.time) displayText = `⏰ ${event.time} ` + displayText;
                  if (status === 'done') displayText += ' ✓';
                  if (status === 'late') displayText += ' ⚠';
                  
                  const lines = getLines(ctx, displayText, eventW - 20);
                  
                  const lineHeight = 18;
                  const topPadding = 12;
                  const bottomPadding = 12;
                  const totalTextHeight = lines.length * lineHeight;
                  const dynamicHeight = totalTextHeight + topPadding + bottomPadding;
                  
                  ctx.fillStyle = finalColor;
                  ctx.beginPath();
                  ctx.roundRect(x + eventMargin, eventY, eventW, dynamicHeight, 18);
                  ctx.fill();
                  
                  ctx.fillStyle = textColor;
                  ctx.textAlign = 'center';
                  
                  let textY = eventY + topPadding + 12; 

                  ctx.font = 'bold 14px Arial';
                  lines.forEach(line => {
                      ctx.fillText(line, x + (colWidth / 2), textY);
                      textY += lineHeight;
                  });
                  
                  eventY += dynamicHeight + eventSpacing;
                });
                
                maxWeekHeight = Math.max(maxWeekHeight, eventY - currentY);
              });
              
              currentY += maxWeekHeight + 30; 
            });

            if (legendItems.length > 0) {
              currentY += 40;
              ctx.fillStyle = '#000000';
              ctx.font = 'bold 24px Arial';
              ctx.textAlign = 'left';
              ctx.fillText('LEGENDA:', padding, currentY + 24);
              
              const itemsPerRow = 5;
              const itemWidth = (contentWidth - 150 - ((itemsPerRow - 1) * 10)) / itemsPerRow;
              
              legendItems.forEach((item, idx) => {
                const row = Math.floor(idx / itemsPerRow);
                const col = idx % itemsPerRow;
                const itemX = padding + 150 + (col * (itemWidth + 10));
                const itemY = currentY + (row * 45);
                
                ctx.fillStyle = item.color || '#000000';
                ctx.beginPath();
                ctx.roundRect(itemX, itemY, itemWidth, 36, 18);
                ctx.fill();
                
                ctx.fillStyle = getTextColor(item.color);
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                
                let label = item.label || '';
                while (ctx.measureText(label).width > itemWidth - 20 && label.length > 3) label = label.slice(0, -4) + '...';
                
                ctx.fillText(label, itemX + (itemWidth / 2), itemY + 24);
              });
            }
            
            return { canvas, finalHeight };
          };

          const exportAsImage = async () => {
            try {
              const { canvas } = drawCalendarToCanvas();
              canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa';
                link.download = `calendario-${companyName}-${months[month]}-${year}.png`;
                link.click();
                URL.revokeObjectURL(url);
              }, 'image/png', 1.0);
            } catch (error) {
              alert('Erro ao exportar imagem.');
            }
          };

          const exportAsPDF = async () => {
            try {
              if (!window.jspdf) {
                const scriptPDF = document.createElement('script');
                scriptPDF.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                document.head.appendChild(scriptPDF);
                await new Promise((resolve) => scriptPDF.onload = resolve);
              }
              const { canvas, finalHeight } = drawCalendarToCanvas();
              const imgData = canvas.toDataURL('image/png', 1.0);
              
              const pdf = new window.jspdf.jsPDF({
                orientation: finalHeight > 1920 ? 'portrait' : 'landscape',
                unit: 'px',
                format: [1920, finalHeight],
                compress: true
              });
              
              pdf.addImage(imgData, 'PNG', 0, 0, 1920, finalHeight, '', 'FAST');
              const companyName = companies.find(c => c.id === selectedCompany)?.name || 'empresa';
              pdf.save(`calendario-${companyName}-${months[month]}-${year}.pdf`);
            } catch (error) {
              alert('Erro ao exportar PDF.');
            }
          };

          const renderCalendarUI = () => {
            const weeks = getWeeks();
            const daysInMonth = getDaysInMonth(year, month);
            const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

            return (
              <div className="bg-white rounded-xl shadow-2xl p-4 md:p-8 border border-gray-200">
                <div className="mb-6 md:mb-8 border-b pb-4">
                  <h2 className="text-2xl md:text-4xl font-black text-gray-900 uppercase tracking-tight">
                    {months[month]} {year} <span className="text-gray-400 font-medium">|</span> {companies.find(c => c.id === selectedCompany)?.name}
                  </h2>
                </div>

                <div className="hidden md:block overflow-x-auto pb-4">
                  <div className="min-w-[800px]">
                    <div className="grid grid-cols-7 gap-4 mb-6">
                      {fullWeekDays.map(day => (
                        <div key={day} className="bg-black text-white text-center py-3 rounded-full font-bold text-xs md:text-sm tracking-wide shadow-md">
                          {day}
                        </div>
                      ))}
                    </div>

                    <div className="space-y-8">
                      {weeks.map((week, wIdx) => (
                        <div key={wIdx} className="flex flex-col">
                          <div className="bg-black rounded-full h-10 flex items-center px-4 mb-4 shadow-md">
                            {week.map((day, dIdx) => (
                              <div key={dIdx} className="flex-1 text-white font-bold text-lg px-2">
                                {day || ''}
                              </div>
                            ))}
                          </div>
                          
                          <div className="grid grid-cols-7 gap-4">
                            {week.map((day, dIdx) => (
                              <div key={dIdx} className="flex flex-col gap-2 min-h-[60px]">
                                {day && getEventsForDay(day).map((event, eIdx) => {
                                  const color = safeColorOptions.find(c => c.id === event.color);
                                  if (!color) return null;
                                  
                                  const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                                  const status = getEventStatus(originalIndex);
                                  const finalColor = getStatusColor(color.color, status);
                                  const textColor = getTextColor(finalColor);
                                  
                                  return (
                                    <div
                                      key={eIdx}
                                      style={{ backgroundColor: finalColor, color: textColor }}
                                      className="rounded-xl px-2 py-2 text-[10px] md:text-[11px] font-bold text-center shadow-sm transition-transform hover:scale-105 cursor-default flex flex-col items-center justify-center break-words whitespace-normal leading-tight"
                                      title={event.text}
                                    >
                                      <span>
                                          {event.time && <span className="opacity-90 font-black mr-1"><Clock /> {event.time}</span>}
                                          {event.text}
                                          {status === 'done' && <span className="ml-1">✓</span>}
                                          {status === 'late' && <span className="ml-1">⚠</span>}
                                      </span>
                                    </div>
                                  );
                                })}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="block md:hidden space-y-3 mt-2">
                  {daysArray.map(day => {
                    const dayEvents = getEventsForDay(day);
                    const date = new Date(year, month, day);
                    const dayOfWeek = fullWeekDays[date.getDay()];
                    
                    return (
                      <div key={day} className={`border rounded-xl p-3 shadow-sm transition ${dayEvents.length > 0 ? 'bg-white border-gray-300' : 'bg-gray-50 border-gray-100'}`}>
                        <div className="flex items-center gap-3 mb-2">
                          <span className={`w-8 h-8 flex items-center justify-center rounded-full font-black text-sm ${dayEvents.length > 0 ? 'bg-black text-white' : 'bg-gray-200 text-gray-500'}`}>
                            {day}
                          </span>
                          <span className={`font-bold text-sm uppercase ${dayEvents.length > 0 ? 'text-gray-800' : 'text-gray-400'}`}>
                            {dayOfWeek}
                          </span>
                        </div>
                        
                        {dayEvents.length > 0 && (
                          <div className="flex flex-col gap-2 pl-11">
                            {dayEvents.map((event, eIdx) => {
                              const color = safeColorOptions.find(c => c.id === event.color);
                              if (!color) return null;
                              
                              const originalIndex = safeEvents.findIndex(e => e.day === event.day && e.text === event.text && e.color === event.color && e.month === event.month && e.year === event.year);
                              const status = getEventStatus(originalIndex);
                              const finalColor = getStatusColor(color.color, status);
                              const textColor = getTextColor(finalColor);
                              
                              return (
                                <div
                                  key={eIdx}
                                  style={{ backgroundColor: finalColor, color: textColor }}
                                  className="rounded-xl px-3 py-2 text-xs font-bold shadow-sm flex flex-col break-words whitespace-normal leading-tight"
                                >
                                  <span>
                                      {event.time && <span className="opacity-90 font-black mr-1"><Clock /> {event.time}</span>}
                                      {event.text}
                                      {status === 'done' && <span className="ml-1">✓</span>}
                                      {status === 'late' && <span className="ml-1">⚠</span>}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {getLegendItems().length > 0 && (
                  <div className="mt-8 md:mt-12 pt-6 border-t">
                    <h3 className="font-bold text-lg md:text-xl mb-4 text-gray-800">LEGENDA</h3>
                    <div className="flex flex-wrap gap-2 md:gap-3">
                      {getLegendItems().map(item => (
                        <div key={item.id} style={{ backgroundColor: item.color || '#000000', color: getTextColor(item.color) }} className="rounded-full px-4 md:px-6 py-1 md:py-2 text-xs md:text-sm font-bold shadow-sm">
                          {item.label}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          };

          if (loadingAuth) return <div className="min-h-screen flex items-center justify-center bg-gray-100 font-bold text-gray-500">Carregando Nuvem...</div>;

          // --- TELA DE LOGIN DINÂMICA (Login x Recuperar Senha) ---
          if (!user) {
              return (
                  <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-900 p-4">
                      <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full relative overflow-hidden">
                          
                          {/* Cabeçalho que muda dependendo da tela */}
                          <div className="text-center mb-8">
                              <span className="text-5xl">{isResetMode ? '🔐' : '📅'}</span>
                              <h2 className="text-3xl font-black mt-2 text-gray-800 tracking-tight">
                                  {isResetMode ? 'Recuperar Senha' : 'Calendário UPLI'}
                              </h2>
                              <p className="text-gray-500 text-sm mt-1">
                                  {isResetMode ? 'Digite seu e-mail para receber o link' : 'Faça login para acessar a nuvem'}
                              </p>
                          </div>
                          
                          {isResetMode ? (
                              /* TELA DE ESQUECI A SENHA */
                              <form onSubmit={handleForgotPasswordSubmit} className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                                  <input 
                                      type="email" 
                                      placeholder="Seu e-mail cadastrado" 
                                      className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" 
                                      value={email} 
                                      onChange={e=>setEmail(e.target.value)} 
                                      required 
                                  />
                                  
                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">
                                      ENVIAR LINK
                                  </button>
                                  
                                  <div className="text-center mt-4 pt-2 border-t">
                                      <button type="button" onClick={() => setIsResetMode(false)} className="text-sm text-gray-500 hover:text-gray-800 font-bold transition">
                                          ← Voltar para o login
                                      </button>
                                  </div>
                              </form>
                          ) : (
                              /* TELA DE LOGIN NORMAL */
                              <form onSubmit={handleLogin} className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                                  <input 
                                      type="email" 
                                      placeholder="E-mail de acesso" 
                                      className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" 
                                      value={email} 
                                      onChange={e=>setEmail(e.target.value)} 
                                      required 
                                  />
                                  <input 
                                      type="password" 
                                      placeholder="Senha" 
                                      className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-blue-500 transition font-medium" 
                                      value={password} 
                                      onChange={e=>setPassword(e.target.value)} 
                                      required 
                                  />
                                  
                                  <div className="flex justify-end">
                                      <button type="button" onClick={() => setIsResetMode(true)} className="text-sm text-blue-600 hover:text-blue-800 font-bold transition mt-1">
                                          Esqueceu a senha?
                                      </button>
                                  </div>

                                  <button type="submit" className="w-full bg-blue-600 text-white font-black text-lg p-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">
                                      ENTRAR
                                  </button>
                              </form>
                          )}
                      </div>
                  </div>
              );
          }

          const eventsWithOriginalIndex = safeEvents.map((ev, index) => ({ ...ev, originalIndex: index }));
          const currentMonthEventsList = eventsWithOriginalIndex.filter(e => e.month === month && e.year === year);

          return (
            <div className="min-h-screen bg-gray-100 p-2 md:p-8">
              
              {/* MODAL DE PERFIL */}
              {showProfileModal && (
                  <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                      <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full space-y-4">
                          <h3 className="text-xl font-black text-gray-800 border-b pb-2 flex items-center gap-2">👤 Meu Perfil</h3>
                          
                          <div>
                              <label className="block text-sm font-bold text-gray-700 mb-1">Nome de Exibição</label>
                              <input 
                                  type="text" 
                                  value={newDisplayName} 
                                  onChange={e => setNewDisplayName(e.target.value)} 
                                  className="w-full border-2 border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500"
                                  placeholder="Ex: Stefany..."
                              />
                          </div>

                          <div className="pt-4 flex flex-col gap-2">
                              <button onClick={handleUpdateProfile} className="w-full bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 transition shadow-sm">
                                  Salvar Nome
                              </button>
                              <button onClick={handleResetPasswordLogged} className="w-full bg-yellow-500 text-white font-bold py-2 rounded-lg hover:bg-yellow-600 transition shadow-sm">
                                  Redefinir Senha (E-mail)
                              </button>
                              <button onClick={() => setShowProfileModal(false)} className="w-full bg-gray-200 text-gray-800 font-bold py-2 rounded-lg hover:bg-gray-300 transition mt-2">
                                  Fechar
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              <div className="max-w-7xl mx-auto space-y-6">
                
                <div className="bg-white rounded-xl p-4 md:p-6 shadow-md border border-gray-200">
                  <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-6 border-b pb-4">
                    <div>
                      <h1 className="text-2xl md:text-3xl font-black flex items-center gap-3 text-gray-800">
                        <CalendarDays /> Criador de Calendário UPLI
                      </h1>
                      <p className="text-xs text-green-600 font-bold mt-2 flex items-center gap-1"><DatabaseIcon /> Conectado à Nuvem Firebase</p>
                    </div>
                    
                    {/* BARRA DE USUÁRIO E BOTÕES */}
                    <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                      
                      {/* CRACHÁ DO USUÁRIO */}
                      <div className="flex items-center gap-3 mr-2 bg-blue-50 border border-blue-200 px-4 py-2 rounded-xl shadow-sm">
                          <div className="bg-blue-200 text-blue-700 w-8 h-8 flex items-center justify-center rounded-full text-lg">
                              👤
                          </div>
                          <div className="flex flex-col leading-tight">
                              <span className="text-sm font-black text-gray-800">{currentUserName}</span>
                              <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Administrador(a)</span>
                          </div>
                          <button onClick={() => { setNewDisplayName(user.displayName || ''); setShowProfileModal(true); }} className="text-blue-400 hover:text-blue-700 transition p-1 ml-1" title="Editar Perfil">
                              <Edit2/>
                          </button>
                      </div>

                      <label className="flex-1 md:flex-none bg-blue-600 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-sm cursor-pointer" title="Importar TXT com cores">
                        <Upload /> Importar TXT
                        <input type="file" accept=".txt" onChange={handleFileUpload} className="hidden" />
                      </label>

                      <button onClick={exportData} className="flex-1 md:flex-none bg-green-600 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-sm"><Download /> Backup JSON</button>
                      <button onClick={clearAllData} className="flex-1 md:flex-none bg-yellow-500 text-white rounded-lg px-4 py-2 text-sm font-bold hover:bg-yellow-600 transition flex items-center justify-center gap-2 shadow-sm" disabled={!selectedCompany} title="Limpar eventos da tela">Limpar Tela</button>
                      <button onClick={handleLogout} className="flex-1 md:flex-none bg-red-100 text-red-700 rounded-lg px-4 py-2 text-sm font-bold hover:bg-red-200 transition flex items-center justify-center gap-2 shadow-sm"><LogOut /> Sair</button>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="space-y-6">
                      <div className="bg-gray-50 p-4 md:p-5 rounded-xl border border-gray-200">
                        <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">🏢 Gerenciar Empresas</h3>
                        
                        <div className="flex gap-2 mb-4">
                          <input type="text" placeholder="Nome da nova empresa..." value={newCompanyName} onChange={e => setNewCompanyName(e.target.value)} onKeyPress={e => e.key === 'Enter' && addCompany()} className="flex-1 border-2 border-gray-300 rounded-lg px-3 py-2 focus:border-blue-500 outline-none w-full" />
                          <button onClick={addCompany} className="bg-gray-800 text-white rounded-lg px-4 font-bold hover:bg-black transition">Add</button>
                        </div>
                        
                        {companies.length > 0 && (
                          <div className="flex flex-col gap-2 mt-4 max-h-48 overflow-y-auto pr-2">
                            <label className="text-xs font-bold text-gray-500 uppercase">Empresas na Nuvem:</label>
                            {companies.map(company => (
                              <div key={company.id} className={`flex flex-col sm:flex-row items-start sm:items-center justify-between border-2 rounded-lg p-2 transition gap-2 sm:gap-0 ${selectedCompany === company.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white'}`}>
                                
                                {editingCompany === company.id ? (
                                  <div className="flex items-center gap-2 w-full">
                                    <input type="text" value={editCompanyName} onChange={e => setEditCompanyName(e.target.value)} className="flex-1 border-2 rounded px-2 py-1 text-sm outline-none" onKeyPress={e => e.key === 'Enter' && saveEditCompany()} />
                                    <button onClick={saveEditCompany} className="bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">Salvar</button>
                                    <button onClick={cancelEditCompany} className="bg-gray-400 text-white px-3 py-1 rounded text-sm font-bold">Cancelar</button>
                                  </div>
                                ) : (
                                  <>
                                    <div 
                                      className="flex-1 font-bold cursor-pointer truncate w-full sm:w-auto" 
                                      onClick={() => setSelectedCompany(company.id)}
                                    >
                                      {company.name} {selectedCompany === company.id && <span className="text-blue-500 text-xs sm:ml-2 block sm:inline">(Selecionada)</span>}
                                    </div>
                                    <div className="flex items-center gap-1 w-full sm:w-auto justify-end">
                                      <button onClick={() => startEditCompany(company)} className="text-blue-500 hover:text-blue-700 p-2 rounded hover:bg-blue-100 transition" title="Editar nome"><Edit2 /></button>
                                      <button 
                                        onClick={() => removeCompany(company.id)} 
                                        className="text-white bg-red-500 hover:bg-red-700 px-3 py-1 rounded-md text-sm font-bold flex items-center gap-1 transition shadow-sm"
                                        title="Excluir esta empresa da nuvem"
                                      >
                                        <Trash2 /> Excluir
                                      </button>
                                    </div>
                                  </>
                                )}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>

                      <div className="flex flex-col sm:flex-row gap-4">
                        <div className="flex-1">
                          <label className="block text-sm font-bold text-gray-700 mb-2">Mês</label>
                          <select value={month} onChange={e => setMonth(parseInt(e.target.value))} className="w-full border-2 border-gray-300 rounded-lg px-3 py-3 font-bold bg-white outline-none cursor-pointer">
                            {months.map((m, i) => <option key={i} value={i}>{m}</option>)}
                          </select>
                        </div>
                        <div className="flex-1">
                          <label className="block text-sm font-bold text-gray-700 mb-2">Ano</label>
                          <input type="number" value={year} onChange={e => setYear(parseInt(e.target.value) || 2026)} className="w-full border-2 border-gray-300 rounded-lg px-3 py-3 font-bold outline-none" />
                        </div>
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div className="bg-blue-50 p-4 md:p-5 rounded-xl border border-blue-100">
                        <h3 className="font-bold text-blue-900 mb-3 flex items-center gap-2">🎨 Categorias</h3>
                        <div className="flex gap-2 mb-4">
                          <input type="text" placeholder="Ex: REELS..." value={newCategory.label} onChange={e => setNewCategory({...newCategory, label: e.target.value})} className="flex-1 border-2 border-blue-200 rounded-lg px-3 py-2 outline-none focus:border-blue-500 w-full" />
                          <input type="color" value={newCategory.color} onChange={e => setNewCategory({...newCategory, color: e.target.value})} className="w-12 h-11 rounded cursor-pointer border-2 border-blue-200 p-0 shrink-0" />
                          <button onClick={addCategory} className="bg-blue-600 text-white rounded-lg px-4 font-bold hover:bg-blue-700 transition">Add</button>
                        </div>
                        
                        <div className="flex flex-wrap gap-2 max-h-40 overflow-y-auto p-1">
                          {safeColorOptions.map(color => {
                            if (editingColor === color.id) {
                              return (
                                <div key={color.id} className="flex items-center gap-1 bg-white border-2 border-blue-400 p-1 rounded-full shadow-sm">
                                  <input type="color" value={editColorValue} onChange={e => setEditColorValue(e.target.value)} className="w-6 h-6 p-0 border-0 rounded-full cursor-pointer ml-1"/>
                                  <input type="text" value={editLabel} onChange={e => setEditLabel(e.target.value)} className="w-24 text-xs font-bold border rounded px-2 py-1 outline-none"/>
                                  <button onClick={saveEditCategory} className="bg-green-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs hover:bg-green-600">✓</button>
                                  <button onClick={cancelEditCategory} className="bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs hover:bg-red-600 mr-1">×</button>
                                </div>
                              );
                            }
                            
                            return (
                              <div key={color.id} style={{backgroundColor: color.color || '#000000', color: getTextColor(color.color)}} className="flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold shadow-sm group">
                                {color.label}
                                <button onClick={() => startEditCategory(color)} className="ml-1 opacity-70 hover:opacity-100 transition-opacity" title="Editar Cor/Nome"><Edit2 /></button>
                                <button onClick={() => removeCategory(color.id)} className="ml-1 hover:text-red-900 font-black text-sm" title="Remover Categoria">×</button>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      <div className="bg-green-50 p-4 md:p-5 rounded-xl border border-green-100">
                        <h3 className="font-bold text-green-900 mb-3 flex items-center gap-2">📌 Adicionar Evento Manual</h3>
                        <div className="flex flex-col sm:flex-row gap-2">
                          <input type="number" placeholder="Dia" value={newEvent.day} onChange={e => setNewEvent({...newEvent, day: e.target.value})} className="w-full sm:w-16 border-2 border-green-200 rounded-lg px-2 py-2 text-center font-bold outline-none" />
                          <input type="time" placeholder="Horário" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} className="w-full sm:w-28 border-2 border-green-200 rounded-lg px-2 py-2 text-center font-bold outline-none" />
                          <input type="text" placeholder="O que vai rolar?" value={newEvent.text} onChange={e => setNewEvent({...newEvent, text: e.target.value})} className="flex-1 border-2 border-green-200 rounded-lg px-3 py-2 outline-none focus:border-green-500" />
                        </div>
                        <div className="flex flex-col sm:flex-row gap-2 mt-2">
                          <select value={newEvent.color} onChange={e => setNewEvent({...newEvent, color: e.target.value})} className="flex-1 border-2 border-green-200 rounded-lg px-3 py-2 outline-none font-bold bg-white w-full">
                            <option value="">Escolha a categoria...</option>
                            {safeColorOptions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                          </select>
                          <button onClick={addEvent} disabled={!newEvent.color || !newEvent.text || !newEvent.day} className="bg-green-600 disabled:bg-gray-400 text-white rounded-lg px-6 py-2 font-bold hover:bg-green-700 transition shadow-sm w-full sm:w-auto">Postar</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* LISTA DE EVENTOS RÁPIDA - AGRUPADA POR CATEGORIA */}
                  <div className="mt-8 border-t pt-6">
                    <h3 className="font-bold text-gray-800 mb-4">Gerenciar Posts Cadastrados ({currentMonthEventsList.length})</h3>
                    
                    <div className="space-y-6 max-h-96 overflow-y-auto pr-2">
                      {safeColorOptions.map(category => {
                        const catEvents = currentMonthEventsList.filter(e => e.color === category.id).sort((a,b) => a.day - b.day);
                        
                        if (catEvents.length === 0) return null;

                        return (
                          <div key={category.id} className="bg-white border rounded-xl p-4 shadow-sm">
                            <h4 className="font-black text-lg mb-3 border-b pb-2" style={{ color: category.color || '#000000' }}>{category.label}</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                              {catEvents.map((event) => {
                                const originalIndex = event.originalIndex;
                                const status = getEventStatus(originalIndex);
                                
                                // MODO DE EDIÇÃO
                                if (editingEventIndex === originalIndex) {
                                  return (
                                    <div key={originalIndex} className="bg-blue-50 border-2 border-blue-400 rounded-lg p-3 shadow-md flex flex-col gap-2">
                                      <div className="flex gap-2">
                                        <input type="number" placeholder="Dia" value={editEventForm.day} onChange={e => setEditEventForm({...editEventForm, day: e.target.value})} className="w-16 border p-1 text-sm rounded font-bold outline-none" />
                                        <input type="time" value={editEventForm.time} onChange={e => setEditEventForm({...editEventForm, time: e.target.value})} className="flex-1 border p-1 text-sm rounded outline-none" />
                                      </div>
                                      <input type="text" value={editEventForm.text} onChange={e => setEditEventForm({...editEventForm, text: e.target.value})} className="w-full border p-1 text-sm rounded outline-none" />
                                      <select value={editEventForm.color} onChange={e => setEditEventForm({...editEventForm, color: e.target.value})} className="w-full border p-1 text-sm rounded outline-none bg-white">
                                        {safeColorOptions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                      </select>
                                      <div className="flex gap-2 mt-1">
                                        <button onClick={saveEditEvent} className="flex-1 bg-green-500 text-white px-2 py-1 rounded text-xs font-bold hover:bg-green-600 transition">Salvar</button>
                                        <button onClick={cancelEditEvent} className="flex-1 bg-gray-400 text-white px-2 py-1 rounded text-xs font-bold hover:bg-gray-500 transition">Cancelar</button>
                                      </div>
                                    </div>
                                  );
                                }

                                // MODO DE VISUALIZAÇÃO
                                return (
                                  <div key={originalIndex} className="bg-gray-50 border rounded-lg p-3 flex flex-col gap-2 transition hover:bg-white hover:shadow-md">
                                    <div className="flex items-start gap-2">
                                      <span className="bg-gray-200 text-gray-800 font-black text-xs px-2 py-1 rounded flex-shrink-0 mt-0.5">
                                        D{event.day} {event.time && <span className="ml-1 text-[10px] opacity-70">({event.time})</span>}
                                      </span>
                                      <span style={{backgroundColor: category.color || '#000000', color: getTextColor(category.color)}} className="text-xs font-bold px-2 py-1 rounded-md flex-1 break-words whitespace-normal leading-tight">
                                        {event.text}
                                      </span>
                                    </div>
                                    <div className="flex justify-between items-center mt-1">
                                      <div className="flex gap-1">
                                        <button onClick={() => toggleEventStatus(originalIndex, 'done')} className={`px-2 py-1 rounded text-[10px] md:text-xs font-bold transition ${status === 'done' ? 'bg-green-600 text-white' : 'bg-green-100 text-green-700 hover:bg-green-200'}`}>✓ Feito</button>
                                        <button onClick={() => toggleEventStatus(originalIndex, 'late')} className={`px-2 py-1 rounded text-[10px] md:text-xs font-bold transition ${status === 'late' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}`}>⚠ Atraso</button>
                                      </div>
                                      <div className="flex gap-2">
                                        <button onClick={() => startEditEvent(event, originalIndex)} className="text-blue-500 hover:text-blue-700 transition" title="Editar Evento"><Edit2 /></button>
                                        <button onClick={() => removeEvent(originalIndex)} className="text-red-500 hover:text-red-700 transition" title="Excluir Evento"><Trash2 /></button>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {selectedCompany && renderCalendarUI()}

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CalendarCreator /></ErrorBoundary>);
    </script>
</body>
</html>
